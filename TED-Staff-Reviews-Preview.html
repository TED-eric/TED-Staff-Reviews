  <script type="text/babel">
const { useState, useEffect, useCallback } = React;

const KEYS = { emps: "ted-rev-emps", revs: "ted-rev-revs", sched: "ted-rev-sched", incs: "ted-rev-incs", form: "ted-rev-form" };

// ── Default form definition (matches TED Employee Performance Review PDF) ─────
// Stored in shared storage so it's editable by the owner and used for all reviews.

const DEFAULT_FORM_DEF = {

        { id: "e3", num: 3, type: "rating", selfAssess: false, text: "Does the employee complete work within scope without requiring excessive revisions or supervision?", scaleMin: "Needs significant improvement", scaleMax: "Exceptional" },

        { id: "q7",  num: 7, type: "rating", selfAssess: true,  text: "How well does the employee incorporate feedback and iterate toward the best possible outcome?", scaleMin: "Needs significant improvement", scaleMax: "Exceptional" },
        { id: "q8",  num: 8, type: "rating", selfAssess: true,  text: "Does this employee show the ability to work autonomously when required?", scaleMin: "Relies heavily on constant feedback", scaleMax: "Capable of working independently" },

        { id: "d11", num: 11, type: "rating", selfAssess: true,  text: "Does the employee take ownership of their work and accountability for mistakes?", scaleMin: "Needs significant improvement", scaleMax: "Exceptional" },
        { id: "d12", num: 12, type: "rating", selfAssess: false, text: "How well does this employee adapt when priorities shift, new constraints emerge, or scope changes mid-project?", scaleMin: "Needs significant improvement", scaleMax: "Exceptional" },
        { id: "d13", num: 13, type: "text",   selfAssess: false, text: "Notes on dependability:", placeholder: "Optional comments…" },
      ],
    },
    {
      id: "teamwork", title: "Teamwork & Collaboration",
      description: "Reviewer completes this section", color: "#D4793A", bg: "#FAF0E6",
      questions: [
        { id: "t14", num: 14, type: "rating", selfAssess: true,  text: "How effectively does this employee communicate with colleagues across the studio?", scaleMin: "Needs significant improvement", scaleMax: "Exceptional" },
        { id: "t15", num: 15, type: "rating", selfAssess: true,  text: "Does this employee contribute positively to team culture — sharing knowledge, lifting others, and staying constructive under stress?", scaleMin: "Needs significant improvement", scaleMax: "Exceptional" },
        { id: "t16", num: 16, type: "rating", selfAssess: true,  text: "How well does the employee give and receive feedback from peers?", scaleMin: "Needs significant improvement", scaleMax: "Exceptional" },
        { id: "t17", num: 17, type: "text",   selfAssess: false, text: "Are there any team dynamics or interpersonal patterns worth noting?", placeholder: "Optional comments…" },
      ],
    },
  ],
  overallOptions: ["Exceeds expectations", "Meets expectations", "Partially meets expectations", "Below expectations"],
};

const REVIEW_TYPES = ["Quarterly", "Mid-Year", "Annual", "90-Day", "Probationary", "Check-In"];

// ── Counseling / incident log constants ──────────────────────────────────────
const REPORTERS = ["Ted Ellison", "Carrie Pilch", "Jenna Kurtz-Medina", "Eric Millman", "Max Robertson-Ellison"];

const INC_CATEGORIES = [
  "Time & Attendance",
  "Performance / Output",
  "Communication",
  "Asset / Resource Management",
  "Workplace Conduct",
  "Safety",
  "Policy Violation",
  "Interpersonal Conflict",
  "Other",
];

const INC_SEVERITY = [
  { key: "observation", label: "Observation",                    color: "#2A7A6E", bg: "#E1F5EE" },
  { key: "verbal",      label: "Verbal Counseling",              color: "#D4793A", bg: "#FAF0E6" },
  { key: "written",     label: "Written Warning",                color: "#5C3D2E", bg: "#F2EBE6" },
  { key: "final",       label: "Final Warning",                  color: "#1B2838", bg: "#E8EDF2" },
  { key: "pip",         label: "Performance Improvement Plan",   color: "#A32D2D", bg: "#FCEBEB" },
];

const uid = () => Math.random().toString(36).slice(2, 9);
const todayStr = () => new Date().toISOString().split("T")[0];
const daysUntil = (d) => Math.round((new Date(d + "T12:00:00") - new Date()) / 86400000);
const fmtDate = (d) =>
  d
    ? new Date(d + "T12:00:00").toLocaleDateString("en-US", {
        month: "short",
        day: "numeric",
        year: "numeric",
      })
    : "";
const avgRatings = (r) => {
  if (r.responses) { // new form-driven format
    const vals = Object.values(r.responses).filter(v => typeof v === "number" && v > 0);
    return vals.length ? (vals.reduce((a, b) => a + b, 0) / vals.length).toFixed(1) : null;
  }
  if (r.sections) { // previous section+prompts format
    const vals = Object.values(r.sections).map((s) => s.rating).filter(Boolean);
    return vals.length ? (vals.reduce((a, b) => a + b, 0) / vals.length).toFixed(1) : null;
  }
  const vals = Object.values(r.ratings || {}).filter(Boolean); // oldest format
  return vals.length ? (vals.reduce((a, b) => a + b, 0) / vals.length).toFixed(1) : null;
};

// ── Shared storage ────────────────────────────────────────────────────────────
// shared:true makes data visible to ALL users of this artifact.
// Share this artifact (or the Claude Project it lives in) with your team
// and everyone reads/writes the same data automatically.

async function storeGet(key) {
  try {
    const val = localStorage.getItem('ted-preview-' + key);
    return val ? JSON.parse(val) : null;
  } catch { return null; }
}

async function storeSet(key, val) {
  try {
    localStorage.setItem('ted-preview-' + key, JSON.stringify(val));
  } catch {}
}

async function storePushAll() {
  return { ok: true };
}

// ── Primitive components ─────────────────────────────────────────────────────

const Avatar = ({ name, size = 40 }) => {
  const initials = name
    .split(" ")
    .map((w) => w[0] || "")
    .join("")
    .slice(0, 2)
    .toUpperCase();
  const hue = [...name].reduce((a, c) => a + c.charCodeAt(0), 0) % 360;
  return (
    <div
      style={{
        width: size,
        height: size,
        borderRadius: "50%",
        background: `hsl(${hue}, 38%, 52%)`,
        display: "flex",
        alignItems: "center",
        justifyContent: "center",
        color: "#fff",
        fontWeight: 500,
        fontSize: size * 0.36,
        flexShrink: 0,
        fontFamily: "'DM Sans', sans-serif",
      }}
    >
      {initials}
    </div>
  );
};

const RatingDots = ({ value, onChange }) => (
  <div style={{ display: "flex", gap: 6, alignItems: "center" }}>
    {[1, 2, 3, 4, 5].map((n) => (
      <div
        key={n}
        onClick={() => onChange && onChange(n)}
        style={{
          width: 22,
          height: 22,
          borderRadius: "50%",
          border: `2px solid ${n <= value ? "#D4793A" : "var(--color-border-secondary)"}`,
          background: n <= value ? "#D4793A" : "transparent",
          cursor: onChange ? "pointer" : "default",
          transition: "all .15s",
          flexShrink: 0,
        }}
      />
    ))}
    {value > 0 && (
      <span style={{ fontSize: 12, color: "var(--color-text-secondary)", marginLeft: 4 }}>
        {RATING_LABELS[value]}
      </span>
    )}
  </div>
);

const UrgencyBadge = ({ days }) => {
  const [bg, text, label] =
    days < 0
      ? ["#FCEBEB", "#A32D2D", `${Math.abs(days)}d overdue`]
      : days === 0
      ? ["#FCEBEB", "#A32D2D", "Today"]
      : days <= 7
      ? ["#FAEEDA", "#854F0B", `${days}d`]
      : days <= 30
      ? ["#EAF3DE", "#3B6D11", `${days}d`]
      : ["#E6F1FB", "#185FA5", `${days}d`];
  return (
    <span
      style={{
        fontSize: 11,
        fontWeight: 600,
        color: text,
        background: bg,
        borderRadius: 4,
        padding: "3px 8px",
        whiteSpace: "nowrap",
        fontFamily: "'DM Sans', sans-serif",
      }}
    >
      {label}
    </span>
  );
};

const Modal = ({ title, onClose, children, wide }) => (
  <div style={{ maxWidth: wide ? 880 : 560 }}>
    <button
      onClick={onClose}
      style={{ background: "none", border: "none", color: "var(--color-text-secondary)", cursor: "pointer", fontSize: 14, marginBottom: 20, fontFamily: "'DM Sans', sans-serif", padding: 0, display: "block" }}
    >
      ← Cancel
    </button>
    <h2
      style={{
        fontFamily: "'DM Sans', sans-serif",
        fontSize: 24,
        fontWeight: 700,
        color: "var(--color-text-primary)",
        margin: "0 0 24px",
      }}
    >
      {title}
    </h2>
    <div
      style={{
        background: "var(--color-background-primary)",
        borderRadius: 12,
        padding: 28,
        border: "0.5px solid var(--color-border-tertiary)",
      }}
    >
      {children}
    </div>
  </div>
);

// Form primitives
const FL = ({ children, mt = 16 }) => (
  <label
    style={{
      display: "block",
      fontSize: 10,
      fontFamily: "'DM Mono', monospace",
      textTransform: "uppercase",
      letterSpacing: "0.12em",
      color: "var(--color-text-secondary)",
      marginTop: mt,
      marginBottom: 6,
    }}
  >
    {children}
  </label>
);
const FI = (props) => (
  <input
    {...props}
    style={{
      width: "100%",
      padding: "9px 12px",
      border: "0.5px solid var(--color-border-secondary)",
      borderRadius: 8,
      fontSize: 14,
      fontFamily: "'DM Sans', sans-serif",
      color: "var(--color-text-primary)",
      background: "var(--color-background-secondary)",
      outline: "none",
      boxSizing: "border-box",
      ...props.style,
    }}
  />
);
const FTA = (props) => (
  <textarea
    {...props}
    style={{
      width: "100%",
      padding: "9px 12px",
      border: "0.5px solid var(--color-border-secondary)",
      borderRadius: 8,
      fontSize: 14,
      fontFamily: "'DM Sans', sans-serif",
      color: "var(--color-text-primary)",
      background: "var(--color-background-secondary)",
      outline: "none",
      resize: "vertical",
      boxSizing: "border-box",
      ...props.style,
    }}
  />
);
const FSel = ({ value, onChange, children }) => (
  <select
    value={value}
    onChange={onChange}
    style={{
      width: "100%",
      padding: "9px 12px",
      border: "0.5px solid var(--color-border-secondary)",
      borderRadius: 8,
      fontSize: 14,
      fontFamily: "'DM Sans', sans-serif",
      color: "var(--color-text-primary)",
      background: "var(--color-background-secondary)",
      outline: "none",
      boxSizing: "border-box",
    }}
  >
    {children}
  </select>
);

const Btn = ({ children, onClick, disabled, variant = "primary", style: extraStyle }) => {
  const styles = {
    primary: {
      background: disabled ? "var(--color-background-secondary)" : "#5C3D2E",
      color: disabled ? "var(--color-text-secondary)" : "#FAF8F5",
      border: "none",
    },
    secondary: {
      background: "transparent",
      color: "var(--color-text-primary)",
      border: "0.5px solid var(--color-border-secondary)",
    },
    danger: {
      background: "transparent",
      color: "#A32D2D",
      border: "0.5px solid #F09595",
    },
  };
  return (
    <button
      onClick={onClick}
      disabled={disabled}
      style={{
        ...styles[variant],
        borderRadius: 8,
        padding: "8px 16px",
        fontFamily: "'DM Sans', sans-serif",
        fontSize: 14,
        fontWeight: 500,
        cursor: disabled ? "not-allowed" : "pointer",
        transition: "all .15s",
        whiteSpace: "nowrap",
        ...extraStyle,
      }}
    >
      {children}
    </button>
  );
};

const FormActions = ({ onCancel, onSave, saveLabel = "Save", disabled }) => (
  <div
    style={{
      display: "flex",
      justifyContent: "flex-end",
      gap: 10,
      marginTop: 24,
      paddingTop: 20,
      borderTop: "0.5px solid var(--color-border-tertiary)",
    }}
  >
    <Btn variant="secondary" onClick={onCancel}>
      Cancel
    </Btn>
    <Btn onClick={onSave} disabled={disabled}>
      {saveLabel}
    </Btn>
  </div>
);

// ── Form modals ──────────────────────────────────────────────────────────────

const AddEmployeeModal = ({ onClose, onSave }) => {
  const [name, setName] = useState("");
  const [role, setRole] = useState("");
  const [email, setEmail] = useState("");
  const [startDate, setStartDate] = useState("");
  return (
    <Modal title="Add staff member" onClose={onClose}>
      <FL mt={0}>Full name *</FL>
      <FI value={name} onChange={(e) => setName(e.target.value)} placeholder="Jane Smith" autoFocus />
      <FL>Role / title</FL>
      <FI value={role} onChange={(e) => setRole(e.target.value)} placeholder="e.g. Senior Fabricator" />
      <FL>Email address</FL>
      <FI type="email" value={email} onChange={(e) => setEmail(e.target.value)} placeholder="jane@studio.com" />
      <FL>Start date</FL>
      <FI type="date" value={startDate} onChange={(e) => setStartDate(e.target.value)} />
      <FormActions
        onCancel={onClose}
        onSave={() => onSave({ id: uid(), name: name.trim(), role: role.trim(), email: email.trim(), startDate, status: "active" })}
        saveLabel="Add staff member"
        disabled={!name.trim()}
      />
    </Modal>
  );
};

const ScheduleModal = ({ emp, onClose, onSave }) => {
  const [date, setDate] = useState("");
  const [type, setType] = useState("Quarterly");
  const [notes, setNotes] = useState("");
  return (
    <Modal title={`Schedule review — ${emp.name}`} onClose={onClose}>

      <FI type="date" value={date} onChange={(e) => setDate(e.target.value)} min={todayStr()} autoFocus />
      <FL>Review type</FL>
      <FSel value={type} onChange={(e) => setType(e.target.value)}>

          <option key={t}>{t}</option>

      </FSel>
      <FL>Notes (optional)</FL>
      <FI value={notes} onChange={(e) => setNotes(e.target.value)} placeholder="Prep reminders…" />
      <FormActions
        onCancel={onClose}
        onSave={() =>
          onSave({
            id: uid(),
            employeeId: emp.id,
            date,
            type,
            notes,
            completed: false,
            createdAt: todayStr(),
          })
        }
        saveLabel="Schedule"
        disabled={!date}
      />

// ── Reusable rating selector for form questions ───────────────────────────────

        <span style={{ marginLeft: 12, fontSize: 12, color: "var(--color-text-secondary)", alignSelf: "center" }}>

      </div>

const ReviewModal = ({ emp, prevReviews, onClose, onSave, formDef, employees }) => {
  const fd = formDef || DEFAULT_FORM_DEF;
  // All active staff + Ted (owner) as input sources — everyone's observations count
  const inputSources = [
    "Ted Ellison",
    ...(employees || [])
      .filter(e => e.status !== "terminated" && e.name !== "Ted Ellison")
      .map(e => e.name),
  ];
  const [date, setDate] = useState(todayStr());
  const [type, setType] = useState("Quarterly");
  const [reviewer, setReviewer] = useState("Ted Ellison");
  const [reviewPeriod, setReviewPeriod] = useState("");
  const [responses, setResponses] = useState({});
  const [peerInputs, setPeerInputs] = useState(Object.fromEntries(fd.sections.map(s => [s.id, []])));
  const [addingPeer, setAddingPeer] = useState(null);
  const [overallRating, setOverallRating] = useState("");
  const [summaryNotes, setSummaryNotes] = useState("");
  const [newGoal, setNewGoal] = useState("");
  const [goals, setGoals] = useState([]);

  const prevOpenGoals = prevReviews.flatMap(r =>
    (r.goals || []).filter(g => g.status === "open").map(g => ({ ...g, sourceReviewId: r.id }))
  );
  const [carry, setCarry] = useState(Object.fromEntries(prevOpenGoals.map(g => [g.id, true])));

  const setResponse = (qId, val) => setResponses(p => ({ ...p, [qId]: val }));

  const savePeerInput = () => {
    if (!addingPeer?.source?.trim() || !addingPeer?.note?.trim()) return;
    const entry = { id: uid(), source: addingPeer.source.trim(), note: addingPeer.note.trim() };
    setPeerInputs(p => ({ ...p, [addingPeer.secId]: [...(p[addingPeer.secId] || []), entry] }));
    setAddingPeer(null);
  };
  const removePeerInput = (secId, id) =>
    setPeerInputs(p => ({ ...p, [secId]: (p[secId] || []).filter(x => x.id !== id) }));

  const addGoal = () => {
    if (!newGoal.trim()) return;
    setGoals(p => [...p, { id: uid(), text: newGoal.trim(), status: "open", createdAt: todayStr() }]);
    setNewGoal("");
  };

  const handleSave = () => {
    const carriedGoals = prevOpenGoals.filter(g => carry[g.id]).map(g => ({ ...g, status: "open", carriedFrom: g.sourceReviewId }));
    const review = {
      id: uid(), employeeId: emp.id, date, type, reviewer, reviewPeriod,
      responses, peerInputs, overallRating, summaryNotes,
      goals: [...carriedGoals, ...goals],
      formSnapshot: fd,
      createdAt: todayStr(),
    };
    const sourceIds = prevOpenGoals.filter(g => carry[g.id]).map(g => g.sourceReviewId);
    const carriedIds = prevOpenGoals.filter(g => carry[g.id]).map(g => g.id);
    onSave(review, sourceIds, carriedIds);
  };

  return (
    <div style={{ maxWidth: 820 }}>
      <button onClick={onClose} style={{ background: "none", border: "none", color: "var(--color-text-secondary)", cursor: "pointer", fontSize: 14, marginBottom: 20, fontFamily: "'DM Sans', sans-serif", padding: 0, display: "block" }}>
        ← Cancel
      </button>
      <div style={{ display: "flex", alignItems: "center", gap: 16, marginBottom: 24 }}>
        <Avatar name={emp.name} size={48} />
        <div>
          <h2 style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 22, fontWeight: 700, color: "var(--color-text-primary)", margin: 0 }}>Performance review — {emp.name}</h2>
          <div style={{ fontSize: 13, color: "var(--color-text-secondary)", marginTop: 3 }}>{emp.role}</div>
        </div>
      </div>

      {/* Header meta */}
      <div style={{ background: "var(--color-background-primary)", border: "0.5px solid var(--color-border-tertiary)", borderRadius: 12, padding: 20, marginBottom: 24, display: "grid", gridTemplateColumns: "1fr 1fr 1fr 1fr", gap: 14 }}>
        <div><FL mt={0}>Review date *</FL><FI type="date" value={date} onChange={e => setDate(e.target.value)} /></div>
        <div><FL mt={0}>Review type</FL><FSel value={type} onChange={e => setType(e.target.value)}>{REVIEW_TYPES.map(t => <option key={t}>{t}</option>)}</FSel></div>
        <div><FL mt={0}>Reviewer</FL><FI value={reviewer} onChange={e => setReviewer(e.target.value)} placeholder="Reviewer name" /></div>
        <div><FL mt={0}>Review period</FL><FI value={reviewPeriod} onChange={e => setReviewPeriod(e.target.value)} placeholder="e.g. Q1 2026" /></div>
      </div>

      {/* Sections */}
      {fd.sections.map(sec => (
        <div key={sec.id} style={{ background: "var(--color-background-primary)", border: "0.5px solid var(--color-border-tertiary)", borderLeft: `3px solid ${sec.color}`, borderRadius: "0 12px 12px 0", marginBottom: 20, overflow: "hidden" }}>
          <div style={{ padding: "12px 20px", background: sec.bg + "55", borderBottom: "0.5px solid var(--color-border-tertiary)" }}>
            <div style={{ fontSize: 15, fontWeight: 600, color: sec.color }}>{sec.title}</div>
            <div style={{ fontSize: 12, color: "var(--color-text-secondary)", marginTop: 2 }}>{sec.description}</div>
          </div>
          <div style={{ padding: "18px 20px 4px" }}>
            {sec.questions.map(q => q.type === "rating" ? (
              <QuestionRating key={q.id} q={q} value={responses[q.id] || 0} onChange={v => setResponse(q.id, v)} />
            ) : (
              <div key={q.id} style={{ marginBottom: 18 }}>
                <div style={{ fontSize: 13, fontWeight: 600, color: "var(--color-text-primary)", marginBottom: 6, lineHeight: 1.5 }}>
                  <span style={{ color: "var(--color-text-secondary)", marginRight: 6 }}>{q.num}.</span>{q.text}
                </div>
                <FTA value={responses[q.id] || ""} onChange={e => setResponse(q.id, e.target.value)} rows={3} placeholder={q.placeholder || "Optional comments…"} />
              </div>
            ))}
          </div>

          {/* Staff input — visible, prominent, everyone included */}
          <div style={{ padding: "16px 20px 18px", background: "#E8DFD0", borderTop: `3px solid ${sec.color}` }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 12 }}>
              <div>
                <div style={{ fontFamily: "'DM Mono', monospace", fontSize: 10, textTransform: "uppercase", letterSpacing: "0.12em", color: sec.color, marginBottom: 3 }}>
                  Staff input {(peerInputs[sec.id] || []).length > 0 && `(${(peerInputs[sec.id] || []).length})`}
                </div>
                <div style={{ fontSize: 12, color: "#5C3D2E" }}>
                  Record observations from anyone on the team — your own notes go here too.
                </div>
              </div>
              {addingPeer?.secId !== sec.id && (
                <button
                  onClick={() => setAddingPeer({ secId: sec.id, source: "Ted Ellison", note: "" })}
                  style={{ background: "#5C3D2E", border: "none", color: "#FAF8F5", borderRadius: 6, padding: "7px 16px", fontSize: 12, fontWeight: 500, cursor: "pointer", fontFamily: "'DM Sans', sans-serif", whiteSpace: "nowrap", flexShrink: 0, marginLeft: 16 }}>
                  + Add input
                </button>
              )}
            </div>

            {(peerInputs[sec.id] || []).map(pi => (
              <div key={pi.id} style={{ background: "#FAF8F5", border: `0.5px solid ${sec.color}44`, borderLeft: `3px solid ${sec.color}`, borderRadius: "0 8px 8px 0", padding: "10px 14px", marginBottom: 8, display: "flex", gap: 12, alignItems: "flex-start" }}>
                <div style={{ flex: 1 }}>
                  <div style={{ fontFamily: "'DM Mono', monospace", fontSize: 10, textTransform: "uppercase", letterSpacing: "0.1em", color: sec.color, marginBottom: 4 }}>{pi.source}</div>
                  <p style={{ fontSize: 13, color: "#1B2838", margin: 0, lineHeight: 1.6 }}>{pi.note}</p>
                </div>
                <button onClick={() => removePeerInput(sec.id, pi.id)}
                  style={{ background: "none", border: "none", cursor: "pointer", fontSize: 18, color: "#5C3D2E", opacity: 0.4, padding: "0 2px", lineHeight: 1 }}>×</button>
              </div>
            ))}

            {addingPeer?.secId === sec.id && (
              <div style={{ background: "#FAF8F5", border: "0.5px solid #D4C8B5", borderRadius: 8, padding: 16, marginTop: 8 }}>
                <div style={{ display: "grid", gridTemplateColumns: "220px 1fr", gap: 14, marginBottom: 12 }}>
                  <div>
                    <div style={{ fontFamily: "'DM Mono', monospace", fontSize: 10, textTransform: "uppercase", letterSpacing: "0.1em", color: "#5C3D2E", marginBottom: 6 }}>Input from</div>
                    <FSel value={addingPeer.source} onChange={e => setAddingPeer(p => ({ ...p, source: e.target.value }))}>
                      {inputSources.map(name => (
                        <option key={name} value={name}>{name}</option>
                      ))}
                    </FSel>
                  </div>
                  <div>
                    <div style={{ fontFamily: "'DM Mono', monospace", fontSize: 10, textTransform: "uppercase", letterSpacing: "0.1em", color: "#5C3D2E", marginBottom: 6 }}>Observation</div>
                    <FTA
                      value={addingPeer.note}
                      onChange={e => setAddingPeer(p => ({ ...p, note: e.target.value }))}
                      placeholder="What did they observe about this person in this area?"
                      rows={3}
                    />
                  </div>
                </div>
                <div style={{ display: "flex", justifyContent: "flex-end", gap: 8 }}>
                  <Btn variant="secondary" onClick={() => setAddingPeer(null)} style={{ fontSize: 12, padding: "5px 12px" }}>Cancel</Btn>
                  <Btn onClick={savePeerInput} disabled={!addingPeer.note?.trim()} style={{ fontSize: 12, padding: "5px 14px" }}>Save input</Btn>
                </div>
              </div>
            )}

            {!(peerInputs[sec.id] || []).length && addingPeer?.secId !== sec.id && (
              <p style={{ fontSize: 12, color: "#5C3D2E", opacity: 0.55, fontStyle: "italic", margin: "4px 0 0" }}>No input recorded yet.</p>
            )}
          </div>
        </div>
      ))}

      {/* Overall rating + summary */}
      <div style={{ background: "var(--color-background-primary)", border: "0.5px solid var(--color-border-tertiary)", borderRadius: 12, padding: 20, marginBottom: 20 }}>
        <div style={{ fontSize: 13, fontWeight: 600, color: "var(--color-text-primary)", marginBottom: 10 }}>18. Overall rating for this review period</div>
        <div style={{ display: "flex", gap: 16, flexWrap: "wrap", marginBottom: 20 }}>
          {fd.overallOptions.map(opt => (
            <label key={opt} style={{ display: "flex", alignItems: "center", gap: 8, fontSize: 14, cursor: "pointer", color: "var(--color-text-primary)" }}>
              <input type="radio" name="overall" checked={overallRating === opt} onChange={() => setOverallRating(opt)} style={{ width: 16, height: 16 }} />
              {opt}
            </label>
          ))}
        </div>
        <FL mt={0}>19. Reviewer's summary notes</FL>
        <FTA value={summaryNotes} onChange={e => setSummaryNotes(e.target.value)} rows={4} placeholder="Final comments, context, or next steps…" />
      </div>

      {/* Goals */}
      <div style={{ background: "var(--color-background-primary)", border: "0.5px solid var(--color-border-tertiary)", borderRadius: 12, padding: 20, marginBottom: 24 }}>
        {prevOpenGoals.length > 0 && (<>
          <FL mt={0}>Carry forward open goals</FL>
          <p style={{ fontSize: 12, color: "var(--color-text-secondary)", margin: "0 0 10px" }}>Checked goals carry into this review.</p>
          {prevOpenGoals.map(g => (
            <label key={g.id} style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 8, fontSize: 13, cursor: "pointer", color: "var(--color-text-primary)" }}>
              <input type="checkbox" checked={!!carry[g.id]} onChange={e => setCarry(p => ({ ...p, [g.id]: e.target.checked }))} />
              {g.text}
            </label>
          ))}
        </>)}
        <FL mt={prevOpenGoals.length > 0 ? 16 : 0}>New goals</FL>
        {goals.map((g, i) => (
          <div key={g.id} style={{ display: "flex", gap: 8, marginBottom: 6, alignItems: "center" }}>
            <span style={{ flex: 1, fontSize: 13, color: "var(--color-text-primary)" }}>• {g.text}</span>
            <button onClick={() => setGoals(p => p.filter((_, j) => j !== i))} style={{ background: "none", border: "none", cursor: "pointer", fontSize: 18, color: "var(--color-text-secondary)" }}>×</button>
          </div>
        ))}
        <div style={{ display: "flex", gap: 8 }}>
          <FI style={{ flex: 1 }} value={newGoal} onChange={e => setNewGoal(e.target.value)} placeholder="Add a goal…" onKeyDown={e => e.key === "Enter" && addGoal()} />
          <Btn variant="secondary" onClick={addGoal}>Add</Btn>
        </div>
      </div>

      <div style={{ display: "flex", justifyContent: "flex-end", gap: 10 }}>
        <Btn variant="secondary" onClick={onClose}>Cancel</Btn>
        <Btn onClick={handleSave} disabled={!date}>Save review</Btn>
      </div>
    </div>
  );
};

// ── Counseling Record Modal ───────────────────────────────────────────────────
const CounselingModal = ({ emp, onClose, onSave, existing }) => {
  const e = existing || {};
  const [date, setDate] = useState(e.date || todayStr());
  const [reporter, setReporter] = useState(e.reporter || REPORTERS[0]);
  const [category, setCategory] = useState(e.category || INC_CATEGORIES[0]);
  const [severity, setSeverity] = useState(e.severity || "observation");
  const [description, setDescription] = useState(e.description || "");
  const [priorYes, setPriorYes] = useState(e.priorDiscussions || false);
  const [priorDetail, setPriorDetail] = useState(e.priorDetail || "");
  const [empResponse, setEmpResponse] = useState(e.employeeResponse || "");
  const [empAck, setEmpAck] = useState(e.employeeAcknowledged || false);
  const [followUp, setFollowUp] = useState(e.followUpDate || "");
  const [newItem, setNewItem] = useState("");
  const [newDue, setNewDue] = useState("");
  const [actionItems, setActionItems] = useState(e.actionItems || []);

  const addItem = () => {
    if (!newItem.trim()) return;
    setActionItems((p) => [...p, { id: uid(), text: newItem.trim(), dueDate: newDue, status: "open", createdAt: todayStr() }]);
    setNewItem(""); setNewDue("");
  };
  const sev = INC_SEVERITY.find((s) => s.key === severity);

  return (
    <Modal title={existing ? "Edit counseling record" : `Counseling record — ${emp.name}`} onClose={onClose} wide>
      {/* Confidential banner */}
      <div style={{ display: "flex", alignItems: "center", gap: 10, background: "#FAEEDA", border: "0.5px solid #FAC775", borderRadius: 8, padding: "9px 14px", marginBottom: 20 }}>
        <span style={{ fontSize: 16 }}>🔒</span>
        <span style={{ fontSize: 12, color: "#633806", fontWeight: 500 }}>
          Confidential — authorized reporters only. Not visible to the employee being documented.
        </span>
      </div>

      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 28 }}>
        {/* Left column */}
        <div>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
            <div>
              <FL mt={0}>Date *</FL>
              <FI type="date" value={date} onChange={(e) => setDate(e.target.value)} />
            </div>
            <div>
              <FL mt={0}>Reported by *</FL>
              <FSel value={reporter} onChange={(e) => setReporter(e.target.value)}>
                {REPORTERS.map((r) => <option key={r}>{r}</option>)}
              </FSel>
            </div>
          </div>

          <FL>Category</FL>
          <FSel value={category} onChange={(e) => setCategory(e.target.value)}>
            {INC_CATEGORIES.map((c) => <option key={c}>{c}</option>)}
          </FSel>

          <FL>Level / type</FL>
          <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
            {INC_SEVERITY.map((s) => (
              <button
                key={s.key}
                onClick={() => setSeverity(s.key)}
                style={{
                  padding: "5px 12px", borderRadius: 6, fontSize: 12, fontFamily: "'DM Sans', sans-serif",
                  fontWeight: 500, cursor: "pointer", border: "none",
                  background: severity === s.key ? s.bg : "var(--color-background-secondary)",
                  color: severity === s.key ? s.color : "var(--color-text-secondary)",
                  outline: severity === s.key ? `2px solid ${s.color}` : "none",
                  transition: "all .15s",
                }}
              >
                {s.label}
              </button>
            ))}
          </div>

          <FL>Description of incident / observation *</FL>
          <FTA
            value={description}
            onChange={(e) => setDescription(e.target.value)}
            rows={5}
            placeholder="Describe what was observed, reported, or occurred. Include dates, times, specifics, and any witnesses if applicable."
          />

          <div style={{ display: "flex", alignItems: "center", gap: 10, marginTop: 16 }}>
            <input type="checkbox" id="prior" checked={priorYes} onChange={(e) => setPriorYes(e.target.checked)} />
            <label htmlFor="prior" style={{ fontSize: 13, color: "var(--color-text-primary)", cursor: "pointer" }}>
              This issue has been discussed with the employee previously
            </label>
          </div>
          {priorYes && (
            <>
              <FL>Prior discussion details</FL>
              <FTA value={priorDetail} onChange={(e) => setPriorDetail(e.target.value)} rows={2} placeholder="When, what was discussed, any prior documentation…" />
            </>
          )}
        </div>

        {/* Right column */}
        <div>
          <FL mt={0}>Employee response / acknowledgment</FL>
          <FTA
            value={empResponse}
            onChange={(e) => setEmpResponse(e.target.value)}
            rows={4}
            placeholder="Document the employee's verbal response, explanation, or any context they provided during the discussion."
          />
          <div style={{ display: "flex", alignItems: "center", gap: 10, marginTop: 12 }}>
            <input type="checkbox" id="ack" checked={empAck} onChange={(e) => setEmpAck(e.target.checked)} />
            <label htmlFor="ack" style={{ fontSize: 13, color: "var(--color-text-primary)", cursor: "pointer" }}>
              Employee was informed of this documentation
            </label>
          </div>

          <FL>Action items / corrective steps</FL>
          <p style={{ fontSize: 12, color: "var(--color-text-secondary)", margin: "0 0 10px" }}>
            Specific steps required, with due dates. These track as open goals on the employee's record.
          </p>
          {actionItems.map((item, i) => (
            <div key={item.id} style={{ display: "flex", gap: 8, marginBottom: 8, alignItems: "center", background: "var(--color-background-secondary)", borderRadius: 6, padding: "7px 10px" }}>
              <div style={{ flex: 1 }}>
                <div style={{ fontSize: 13, color: "var(--color-text-primary)" }}>{item.text}</div>
                {item.dueDate && <div style={{ fontSize: 11, color: "var(--color-text-secondary)", marginTop: 2 }}>Due {fmtDate(item.dueDate)}</div>}
              </div>
              <button onClick={() => setActionItems((p) => p.filter((_, j) => j !== i))}
                style={{ background: "none", border: "none", cursor: "pointer", fontSize: 18, color: "var(--color-text-secondary)" }}>×</button>
            </div>
          ))}
          <div style={{ display: "grid", gridTemplateColumns: "1fr auto auto", gap: 8, marginTop: 4 }}>
            <FI value={newItem} onChange={(e) => setNewItem(e.target.value)} placeholder="Action item…" onKeyDown={(e) => e.key === "Enter" && addItem()} />
            <FI type="date" value={newDue} onChange={(e) => setNewDue(e.target.value)} style={{ width: 140 }} />
            <Btn variant="secondary" onClick={addItem}>Add</Btn>
          </div>

          <FL>Follow-up review date</FL>
          <FI type="date" value={followUp} onChange={(e) => setFollowUp(e.target.value)} min={todayStr()} />
        </div>
      </div>

      <FormActions
        onCancel={onClose}
        onSave={() =>
          onSave({
            id: e.id || uid(),
            employeeId: emp.id,
            date, reporter, category, severity,
            description,
            priorDiscussions: priorYes,
            priorDetail,
            employeeResponse: empResponse,
            employeeAcknowledged: empAck,
            actionItems,
            followUpDate: followUp,
            createdAt: e.createdAt || todayStr(),
            updatedAt: todayStr(),
          })
        }
        saveLabel={existing ? "Save changes" : "Save record"}
        disabled={!date || !description.trim()}
      />
    </Modal>
  );
};

function App() {
  const [loading, setLoading] = useState(true);
  const [employees, setEmployees] = useState([]);
  const [reviews, setReviews] = useState([]);
  const [scheduled, setScheduled] = useState([]);
  const [incidents, setIncidents] = useState([]);
  const [formDef, setFormDef] = useState(DEFAULT_FORM_DEF);
  const [formEditMode, setFormEditMode] = useState(false);
  const [editingQ, setEditingQ] = useState(null); // { secId, qId }
  const [showArchived, setShowArchived] = useState(false);
  const [view, setView] = useState("dashboard");
  const [selEmp, setSelEmp] = useState(null);
  const [selRev, setSelRev] = useState(null);
  const [selInc, setSelInc] = useState(null);
  const [modal, setModal] = useState(null);

  useEffect(() => {
    (async () => {
      const [e, r, s, i, fd] = await Promise.all([
        storeGet(KEYS.emps), storeGet(KEYS.revs),
        storeGet(KEYS.sched), storeGet(KEYS.incs),
        storeGet(KEYS.form),
      ]);
      setEmployees(e || DEFAULT_EMPLOYEES);
      setReviews(r || []);
      setScheduled(s || []);
      setIncidents(i || []);
      if (fd) setFormDef(fd);
      setLoading(false);
    })();
  }, []);

  useEffect(() => {
    if (!loading) storeSet(KEYS.emps, employees);
  }, [employees, loading]);
  useEffect(() => {
    if (!loading) storeSet(KEYS.revs, reviews);
  }, [reviews, loading]);
  useEffect(() => {
    if (!loading) storeSet(KEYS.sched, scheduled);
  }, [scheduled, loading]);
  useEffect(() => {
    if (!loading) storeSet(KEYS.incs, incidents);
  }, [incidents, loading]);
  useEffect(() => {
    if (!loading) storeSet(KEYS.form, formDef);
  }, [formDef, loading]);

  const empRevs = useCallback(
    (id) =>
      reviews
        .filter((r) => r.employeeId === id)
        .sort((a, b) => b.date.localeCompare(a.date)),
    [reviews]
  );
  const empSched = useCallback(
    (id) =>
      scheduled
        .filter((s) => s.employeeId === id && !s.completed)
        .sort((a, b) => a.date.localeCompare(b.date)),
    [scheduled]
  );
  const empIncs = useCallback(
    (id) =>
      incidents
        .filter((i) => i.employeeId === id)
        .sort((a, b) => b.date.localeCompare(a.date)),
    [incidents]
  );
  const allUpcoming = scheduled
    .filter((s) => !s.completed)
    .sort((a, b) => a.date.localeCompare(b.date));

  const navTo = (v, emp = null, rev = null, inc = null) => {
    setView(v);
    if (emp) setSelEmp(emp);
    if (rev) setSelRev(rev);
    if (inc !== null) setSelInc(inc);
    setModal(null);
  };

  // Modal save handlers
  const handleSaveEmployee = (emp) => {
    setEmployees((p) => [...p, emp]);
    setModal(null);
  };
  const handleSaveSchedule = (sched) => {
    setScheduled((p) => [...p, sched]);
    setModal(null);
  };
  const handleSaveReview = (review, sourceIds, carriedIds) => {
    setReviews((p) => {
      const updated = p.map((r) =>
        sourceIds.includes(r.id)
          ? { ...r, goals: r.goals.map((g) => (carriedIds.includes(g.id) ? { ...g, status: "carried" } : g)) }
          : r
      );
      return [...updated, review];
    });
    setScheduled((p) =>
      p.map((s) =>
        s.employeeId === review.employeeId && !s.completed && Math.abs(daysUntil(s.date)) <= 14
          ? { ...s, completed: true }
          : s
      )
    );
    setModal(null);
    setSelRev(review);
    setView("reviewDetail");
  };

  const handleSaveIncident = (inc) => {
    setIncidents((p) => {
      const exists = p.find((x) => x.id === inc.id);
      return exists ? p.map((x) => (x.id === inc.id ? inc : x)) : [...p, inc];
    });
    setModal(null);
    setSelInc(inc);
    setView("incidentDetail");
  };

  const handleTerminate = (terminationData) => {
    setEmployees((p) =>
      p.map((e) =>
        e.id === selEmp.id
          ? { ...e, status: "terminated", terminatedDate: terminationData.date, terminationType: terminationData.type, terminationNotes: terminationData.notes }
          : e
      )
    );
    setModal(null);
    navTo("staff");
  };

  const handleReactivate = (empId) => {
    setEmployees((p) =>
      p.map((e) =>
        e.id === empId
          ? { ...e, status: "active", terminatedDate: "", terminationType: "", terminationNotes: "" }
          : e
      )
    );
  };

  // ── Form editing helpers ─────────────────────────────────────────────────────
  const updateFormQuestion = (secId, qId, field, val) =>
    setFormDef(p => ({ ...p, sections: p.sections.map(s => s.id !== secId ? s : { ...s, questions: s.questions.map(q => q.id !== qId ? q : { ...q, [field]: val }) }) }));

  const deleteFormQuestion = (secId, qId) =>
    setFormDef(p => ({ ...p, sections: p.sections.map(s => s.id !== secId ? s : { ...s, questions: s.questions.filter(q => q.id !== qId) }) }));

  const addFormQuestion = (secId, type) => {
    const sec = formDef.sections.find(s => s.id === secId);
    const maxNum = Math.max(0, ...formDef.sections.flatMap(s => s.questions.map(q => q.num || 0)));
    const newQ = { id: uid(), num: maxNum + 1, type, selfAssess: false, text: type === "rating" ? "New rating question" : "New notes field:", scaleMin: "Needs significant improvement", scaleMax: "Exceptional", placeholder: "Optional comments…" };
    setFormDef(p => ({ ...p, sections: p.sections.map(s => s.id !== secId ? s : { ...s, questions: [...s.questions, newQ] }) }));
    setEditingQ({ secId, qId: newQ.id });
  };

  const updateFormSection = (secId, field, val) =>
    setFormDef(p => ({ ...p, sections: p.sections.map(s => s.id !== secId ? s : { ...s, [field]: val }) }));

  const deleteFormSection = (secId) =>
    setFormDef(p => ({ ...p, sections: p.sections.filter(s => s.id !== secId) }));

  const addFormSection = () => {
    const newSec = { id: uid(), title: "New section", description: "Reviewer completes this section", color: "#185FA5", bg: "#E6F1FB", questions: [] };
    setFormDef(p => ({ ...p, sections: [...p.sections, newSec] }));
  };

  const updateOverallOption = (idx, val) =>
    setFormDef(p => ({ ...p, overallOptions: p.overallOptions.map((o, i) => i === idx ? val : o) }));

  const deleteOverallOption = (idx) =>
    setFormDef(p => ({ ...p, overallOptions: p.overallOptions.filter((_, i) => i !== idx) }));

  const addOverallOption = () =>
    setFormDef(p => ({ ...p, overallOptions: [...p.overallOptions, "New option"] }));

  // ── View: Form design ────────────────────────────────────────────────────────
  const renderFormDesign = () => {
    const SECTION_COLORS = ["#0F6E56","#533748","#854F0B","#993C1D","#185FA5","#3C3489","#3B6D11","#A32D2D"];
    const SECTION_BGS   = ["#E1F5EE","#FBEAF0","#FAEEDA","#FAECE7","#E6F1FB","#EEEDFE","#EAF3DE","#FCEBEB"];

    return (
      <div style={{ maxWidth: 820 }}>
        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 24 }}>
          <h1 style={{ ...styles.pageTitle, margin: 0 }}>Review form design</h1>
          <div style={{ display: "flex", gap: 10, alignItems: "center" }}>
            {formEditMode && (
              <Btn variant="secondary" onClick={() => setFormDef(DEFAULT_FORM_DEF)} style={{ fontSize: 12 }}>
                Reset to default
              </Btn>
            )}
            <Btn variant={formEditMode ? "primary" : "secondary"} onClick={() => { setFormEditMode(p => !p); setEditingQ(null); }}>
              {formEditMode ? "✓ Done editing" : "Edit form"}
            </Btn>
          </div>
        </div>

        {!formEditMode && (
          <div style={{ display: "flex", alignItems: "center", gap: 10, background: "#E6F1FB", border: "0.5px solid #B5D4F4", borderRadius: 8, padding: "9px 14px", marginBottom: 20, fontSize: 13, color: "#185FA5" }}>
            This is the live form used for all new reviews. Click "Edit form" to add, remove, or reword questions and sections.
          </div>
        )}

        {/* Sections */}
        {formDef.sections.map((sec, si) => (
          <div key={sec.id} style={{ background: "var(--color-background-primary)", border: "0.5px solid var(--color-border-tertiary)", borderLeft: `3px solid ${sec.color}`, borderRadius: "0 12px 12px 0", marginBottom: 20, overflow: "hidden" }}>
            {/* Section header */}
            <div style={{ padding: "12px 20px", background: sec.bg + "55", borderBottom: "0.5px solid var(--color-border-tertiary)", display: "flex", alignItems: "center", gap: 10 }}>
              {formEditMode ? (
                <>
                  <input value={sec.title} onChange={e => updateFormSection(sec.id, "title", e.target.value)}
                    style={{ fontSize: 15, fontWeight: 600, color: sec.color, background: "transparent", border: "none", outline: "none", flex: 1, fontFamily: "'DM Sans', sans-serif" }} />
                  <div style={{ display: "flex", gap: 4 }}>
                    {SECTION_COLORS.map((c, ci) => (
                      <div key={c} onClick={() => { updateFormSection(sec.id, "color", c); updateFormSection(sec.id, "bg", SECTION_BGS[ci]); }}
                        style={{ width: 16, height: 16, borderRadius: "50%", background: c, cursor: "pointer", border: sec.color === c ? "2px solid var(--color-text-primary)" : "2px solid transparent" }} />
                    ))}
                  </div>
                  <button onClick={() => { if (confirm("Delete this section?")) deleteFormSection(sec.id); }}
                    style={{ background: "none", border: "none", cursor: "pointer", fontSize: 18, color: "#A32D2D", padding: "0 4px" }}>🗑</button>
                </>
              ) : (
                <div style={{ fontSize: 15, fontWeight: 600, color: sec.color }}>{sec.title}</div>
              )}
            </div>

            {/* Questions */}
            <div style={{ padding: formEditMode ? "12px 20px" : "16px 20px 4px" }}>
              {sec.questions.map((q, qi) => (
                <div key={q.id}>
                  {formEditMode && editingQ?.secId === sec.id && editingQ?.qId === q.id ? (
                    /* Inline edit form */
                    <div style={{ background: "var(--color-background-secondary)", borderRadius: 8, padding: 14, marginBottom: 12, border: "0.5px solid var(--color-border-secondary)" }}>
                      <div style={{ display: "grid", gridTemplateColumns: "3fr 1fr", gap: 10, marginBottom: 10 }}>
                        <div>
                          <FL mt={0}>Question text</FL>
                          <FTA value={q.text} onChange={e => updateFormQuestion(sec.id, q.id, "text", e.target.value)} rows={2} />
                        </div>
                        <div>
                          <FL mt={0}>Type</FL>
                          <FSel value={q.type} onChange={e => updateFormQuestion(sec.id, q.id, "type", e.target.value)}>
                            <option value="rating">Rating (1–5)</option>
                            <option value="text">Text / notes</option>
                          </FSel>
                          <label style={{ display: "flex", alignItems: "center", gap: 6, marginTop: 10, fontSize: 12, cursor: "pointer", color: "var(--color-text-primary)" }}>
                            <input type="checkbox" checked={!!q.selfAssess} onChange={e => updateFormQuestion(sec.id, q.id, "selfAssess", e.target.checked)} />
                            Include in self-assessment
                          </label>
                        </div>
                      </div>
                      {q.type === "rating" && (
                        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, marginBottom: 10 }}>
                          <div><FL mt={0}>Scale min label (1)</FL><FI value={q.scaleMin || ""} onChange={e => updateFormQuestion(sec.id, q.id, "scaleMin", e.target.value)} placeholder="e.g. Needs improvement" /></div>
                          <div><FL mt={0}>Scale max label (5)</FL><FI value={q.scaleMax || ""} onChange={e => updateFormQuestion(sec.id, q.id, "scaleMax", e.target.value)} placeholder="e.g. Exceptional" /></div>
                        </div>
                      )}
                      {q.type === "text" && (
                        <div style={{ marginBottom: 10 }}>
                          <FL mt={0}>Placeholder text</FL>
                          <FI value={q.placeholder || ""} onChange={e => updateFormQuestion(sec.id, q.id, "placeholder", e.target.value)} placeholder="Optional comments…" />
                        </div>
                      )}
                      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                        <Btn variant="danger" onClick={() => { if (confirm("Delete this question?")) { deleteFormQuestion(sec.id, q.id); setEditingQ(null); } }} style={{ fontSize: 12, padding: "4px 10px" }}>Delete question</Btn>
                        <Btn onClick={() => setEditingQ(null)} style={{ fontSize: 12, padding: "4px 12px" }}>Done</Btn>
                      </div>
                    </div>
                  ) : formEditMode ? (
                    /* Edit mode row */
                    <div onClick={() => setEditingQ({ secId: sec.id, qId: q.id })}
                      style={{ display: "flex", alignItems: "flex-start", gap: 10, padding: "8px 10px", borderRadius: 6, marginBottom: 4, cursor: "pointer", background: "transparent" }}
                      onMouseOver={e => e.currentTarget.style.background = "var(--color-background-secondary)"}
                      onMouseOut={e => e.currentTarget.style.background = "transparent"}>
                      <span style={{ fontSize: 12, color: "var(--color-text-secondary)", marginTop: 2, minWidth: 20 }}>{q.num}.</span>
                      <div style={{ flex: 1 }}>
                        <div style={{ fontSize: 13, color: "var(--color-text-primary)", lineHeight: 1.5 }}>{q.text}</div>
                        <div style={{ fontSize: 11, color: "var(--color-text-secondary)", marginTop: 2 }}>
                          {q.type === "rating" ? `Rating 1–5 · ${q.scaleMin} → ${q.scaleMax}` : "Text field"}
                          {q.selfAssess && " · ✓ Self-assessment"}
                        </div>
                      </div>
                      <span style={{ fontSize: 11, color: "var(--color-text-secondary)", marginTop: 2 }}>click to edit →</span>
                    </div>
                  ) : (
                    /* Preview mode */
                    q.type === "rating" ? (
                      <QuestionRating key={q.id} q={q} value={0} readOnly />
                    ) : (
                      <div key={q.id} style={{ marginBottom: 18 }}>
                        <div style={{ fontSize: 13, fontWeight: 600, color: "var(--color-text-primary)", marginBottom: 6, lineHeight: 1.5 }}>
                          <span style={{ color: "var(--color-text-secondary)", marginRight: 6 }}>{q.num}.</span>{q.text}
                        </div>
                        <div style={{ border: "0.5px solid var(--color-border-tertiary)", borderRadius: 6, padding: "8px 12px", fontSize: 13, color: "var(--color-text-secondary)", fontStyle: "italic", background: "var(--color-background-secondary)" }}>
                          {q.placeholder || "Optional comments…"}
                        </div>
                      </div>
                    )
                  )}
                </div>
              ))}
              {formEditMode && (
                <div style={{ display: "flex", gap: 8, paddingTop: 8, paddingBottom: 8 }}>
                  <Btn variant="secondary" onClick={() => addFormQuestion(sec.id, "rating")} style={{ fontSize: 12, padding: "5px 12px" }}>+ Rating question</Btn>
                  <Btn variant="secondary" onClick={() => addFormQuestion(sec.id, "text")} style={{ fontSize: 12, padding: "5px 12px" }}>+ Text field</Btn>
                </div>
              )}
            </div>

            {/* Staff input band — always present on every section */}
            <div style={{ padding: "14px 20px 16px", background: "#E8DFD0", borderTop: `3px solid ${sec.color}` }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
                <div>
                  <div style={{ fontFamily: "'DM Mono', monospace", fontSize: 10, textTransform: "uppercase", letterSpacing: "0.12em", color: sec.color, marginBottom: 2 }}>Staff input</div>
                  <div style={{ fontSize: 12, color: "#5C3D2E" }}>Record observations from anyone on the team — your own notes go here too.</div>
                </div>
                <div style={{ background: "#5C3D2E", color: "#FAF8F5", borderRadius: 6, padding: "6px 14px", fontSize: 12, fontFamily: "'DM Sans', sans-serif", opacity: 0.5 }}>+ Add input</div>
              </div>
              <div style={{ display: "grid", gridTemplateColumns: "200px 1fr", gap: 12, marginTop: 10, opacity: 0.6 }}>
                <div>
                  <div style={{ fontFamily: "'DM Mono', monospace", fontSize: 10, textTransform: "uppercase", letterSpacing: "0.1em", color: "#5C3D2E", marginBottom: 5 }}>Input from</div>
                  <div style={{ background: "#FAF8F5", border: "0.5px solid #D4C8B5", borderRadius: 6, padding: "8px 10px", fontSize: 13, color: "#5C3D2E", fontStyle: "italic" }}>Select staff member…</div>
                </div>
                <div>
                  <div style={{ fontFamily: "'DM Mono', monospace", fontSize: 10, textTransform: "uppercase", letterSpacing: "0.1em", color: "#5C3D2E", marginBottom: 5 }}>Observation</div>
                  <div style={{ background: "#FAF8F5", border: "0.5px solid #D4C8B5", borderRadius: 6, padding: "8px 10px", fontSize: 13, color: "#5C3D2E", fontStyle: "italic", minHeight: 60 }}>What did they observe about this person in this area?</div>
                </div>
              </div>
            </div>
          </div>
        ))}

        {/* Overall rating options */}
        <div style={{ background: "var(--color-background-primary)", border: "0.5px solid var(--color-border-tertiary)", borderRadius: 12, padding: 20, marginBottom: 20 }}>
          <div style={{ fontSize: 14, fontWeight: 600, color: "var(--color-text-primary)", marginBottom: 12 }}>18. Overall rating options</div>
          {formDef.overallOptions.map((opt, i) => (
            <div key={i} style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 8 }}>
              {formEditMode ? (
                <>
                  <input value={opt} onChange={e => updateOverallOption(i, e.target.value)}
                    style={{ flex: 1, padding: "6px 10px", border: "0.5px solid var(--color-border-secondary)", borderRadius: 6, fontSize: 13, fontFamily: "'DM Sans', sans-serif", color: "var(--color-text-primary)", background: "var(--color-background-secondary)" }} />
                  <button onClick={() => deleteOverallOption(i)} style={{ background: "none", border: "none", cursor: "pointer", fontSize: 18, color: "#A32D2D" }}>×</button>
                </>
              ) : (
                <div style={{ display: "flex", alignItems: "center", gap: 8, fontSize: 14, color: "var(--color-text-primary)" }}>
                  <div style={{ width: 14, height: 14, border: "1.5px solid var(--color-border-secondary)", borderRadius: 3, flexShrink: 0 }} />
                  {opt}
                </div>
              )}
            </div>
          ))}
          {formEditMode && (
            <Btn variant="secondary" onClick={addOverallOption} style={{ fontSize: 12, padding: "5px 12px", marginTop: 8 }}>+ Add option</Btn>
          )}
        </div>

        {formEditMode && (
          <Btn variant="secondary" onClick={addFormSection} style={{ width: "100%", textAlign: "center", padding: 14, fontSize: 13 }}>+ Add section</Btn>
        )}
      </div>
    );
  };

  // ── View: Dashboard ──────────────────────────────────────────────────────────
  const renderDashboard = () => {
    const upcoming = allUpcoming.slice(0, 6);
    const recent = [...reviews].sort((a, b) => b.date.localeCompare(a.date)).slice(0, 6);
    const overdueCount = allUpcoming.filter((s) => daysUntil(s.date) < 0).length;
    const soonCount = allUpcoming.filter((s) => {
      const d = daysUntil(s.date);
      return d >= 0 && d <= 30;
    }).length;
    return (
      <div>
        <h1 style={styles.pageTitle}>Overview</h1>
        <div style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: 14, marginBottom: 24 }}>
          {[
            { label: "Team members", val: employees.length },
            { label: "Total reviews", val: reviews.length },
            { label: "Upcoming (30 days)", val: soonCount, color: soonCount > 0 ? "#D4793A" : undefined },
            { label: "Overdue", val: overdueCount, color: overdueCount > 0 ? "#A32D2D" : undefined },
          ].map((s) => (
            <div
              key={s.label}
              style={{
                background: "var(--color-background-secondary)",
                borderRadius: 10,
                padding: 20,
                textAlign: "center",
              }}
            >
              <div
                style={{
                  fontFamily: "'DM Sans', sans-serif",
                  fontSize: 38,
                  fontWeight: 700,
                  color: s.color || "var(--color-text-primary)",
                }}
              >
                {s.val}
              </div>
              <div style={{ fontSize: 11, color: "var(--color-text-secondary)", marginTop: 4, textTransform: "uppercase", letterSpacing: "0.06em" }}>
                {s.label}
              </div>
            </div>
          ))}
        </div>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16 }}>
          <Card>
            <CardHeader
              title="Upcoming reviews"
              action={
                <button
                  onClick={() => navTo("schedule")}
                  style={{ background: "none", border: "none", color: "#D4793A", cursor: "pointer", fontSize: 13, fontFamily: "'DM Sans', sans-serif" }}
                >
                  See all →
                </button>
              }
            />
            {upcoming.length === 0 ? (
              <EmptyMsg>No reviews scheduled.</EmptyMsg>
            ) : (
              upcoming.map((s) => {
                const emp = employees.find((e) => e.id === s.employeeId);
                if (!emp) return null;
                return (
                  <ListRow key={s.id} onClick={() => navTo("employee", emp)}>
                    <Avatar name={emp.name} size={34} />
                    <div style={{ flex: 1 }}>
                      <div style={styles.rowName}>{emp.name}</div>
                      <div style={styles.rowMeta}>{s.type} · {fmtDate(s.date)}</div>
                    </div>
                    <UrgencyBadge days={daysUntil(s.date)} />
                  </ListRow>
                );
              })
            )}
          </Card>
          <Card>
            <CardHeader title="Recent reviews" />
            {recent.length === 0 ? (
              <EmptyMsg>No reviews completed yet.</EmptyMsg>
            ) : (
              recent.map((r) => {
                const emp = employees.find((e) => e.id === r.employeeId);
                if (!emp) return null;
                const avg = avgRatings(r);
                return (
                  <ListRow key={r.id} onClick={() => navTo("reviewDetail", emp, r)}>
                    <Avatar name={emp.name} size={34} />
                    <div style={{ flex: 1 }}>
                      <div style={styles.rowName}>{emp.name}</div>
                      <div style={styles.rowMeta}>{r.type} · {fmtDate(r.date)}</div>
                    </div>
                    {avg && (
                      <span style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 22, fontWeight: 700, color: "#D4793A" }}>
                        {avg}
                      </span>
                    )}
                  </ListRow>
                );
              })
            )}
          </Card>
        </div>
      </div>
    );
  };

  // ── View: Staff ──────────────────────────────────────────────────────────────
  const renderStaff = () => {
    const active = employees.filter((e) => e.status !== "terminated");
    const archived = employees.filter((e) => e.status === "terminated");
    const display = showArchived ? archived : active;

    const EmpCard = ({ emp }) => {
      const rl = empRevs(emp.id);
      const ns = empSched(emp.id)[0];
      const openGoals = rl.flatMap((r) => (r.goals || []).filter((g) => g.status === "open")).length;
      const isTerminated = emp.status === "terminated";
      return (
        <div
          key={emp.id}
          onClick={() => navTo("employee", emp)}
          style={{
            background: "var(--color-background-primary)",
            border: `0.5px solid ${isTerminated ? "#F09595" : "var(--color-border-tertiary)"}`,
            borderRadius: 12,
            padding: 20,
            cursor: "pointer",
            opacity: isTerminated ? 0.8 : 1,
            transition: "border-color .15s",
          }}
          onMouseOver={(e) => (e.currentTarget.style.borderColor = isTerminated ? "#E24B4A" : "#D4793A")}
          onMouseOut={(e) => (e.currentTarget.style.borderColor = isTerminated ? "#F09595" : "var(--color-border-tertiary)")}
        >
          <div style={{ display: "flex", alignItems: "center", gap: 14, marginBottom: 14 }}>
            <Avatar name={emp.name} size={48} />
            <div style={{ flex: 1 }}>

              <button
                onClick={() => setShowArchived((p) => !p)}
                style={{ background: "none", border: "none", cursor: "pointer", fontSize: 13, color: showArchived ? "#D4793A" : "var(--color-text-secondary)", fontFamily: "'DM Sans', sans-serif", padding: 0 }}
              >
                {showArchived ? `← Active staff (${active.length})` : `${archived.length} archived`}
              </button>
            )}
          </div>
          {!showArchived && <Btn onClick={() => setModal("addEmp")}>+ Add staff member</Btn>}

          <Card style={{ textAlign: "center", padding: 48 }}>
            <p style={{ color: "var(--color-text-secondary)", marginBottom: 16, fontStyle: "italic" }}>
              {showArchived ? "No archived employees." : "No staff members yet."}

            {!showArchived && <Btn onClick={() => setModal("addEmp")}>Add first staff member</Btn>}
          </Card>
        ) : (
          <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(260px, 1fr))", gap: 14 }}>
            {display.map((emp) => <EmpCard key={emp.id} emp={emp} />)}
          </div>
        )}
      </div>

  // ── View: Schedule ───────────────────────────────────────────────────────────
  const renderSchedule = () => {

    return (
      <div>
        <h1 style={styles.pageTitle}>Review schedule</h1>

          <CardHeader title="Upcoming" />

            <EmptyMsg>No reviews scheduled. Visit a staff member's profile to add one.</EmptyMsg>

            allUpcoming.map((s) => {
              const emp = employees.find((e) => e.id === s.employeeId);
              if (!emp) return null;
              return (
                <ListRow key={s.id}>
                  <Avatar name={emp.name} size={34} />
                  <div style={{ flex: 1 }}>
                    <div style={styles.rowName}>{emp.name}</div>
                    <div style={styles.rowMeta}>
                      {s.type} · {fmtDate(s.date)}
                      {s.notes ? ` · ${s.notes}` : ""}

                  </div>
                  <div style={{ display: "flex", gap: 8, alignItems: "center" }}>

                      style={{ fontSize: 12, padding: "5px 10px", color: "#3B6D11", borderColor: "#97C459" }}
                      onClick={() =>
                        setScheduled((p) =>
                          p.map((x) => (x.id === s.id ? { ...x, completed: true } : x))

                      ✓ Done
                    </Btn>
                    <Btn
                      variant="danger"
                      style={{ fontSize: 12, padding: "5px 10px" }}
                      onClick={() => {
                        if (confirm("Remove this scheduled review?"))

                      }}

                      ×
                    </Btn>
                  </div>
                </ListRow>
              );
            })
          )}
        </Card>
        {completed.length > 0 && (
          <Card>
            <CardHeader title="Completed" />
            {completed.map((s) => {
              const emp = employees.find((e) => e.id === s.employeeId);
              if (!emp) return null;
              return (
                <ListRow key={s.id} muted>
                  <Avatar name={emp.name} size={34} />
                  <div style={{ flex: 1 }}>
                    <div style={styles.rowName}>{emp.name}</div>
                    <div style={styles.rowMeta}>{s.type} · {fmtDate(s.date)} · Completed</div>
                  </div>
                </ListRow>
              );
            })}
          </Card>
        )}
      </div>

  // ── View: Employee ───────────────────────────────────────────────────────────
  const renderEmployee = () => {
    if (!selEmp) return null;
    const emp = employees.find((e) => e.id === selEmp.id) || selEmp; // always fresh
    const isTerminated = emp.status === "terminated";
    const rl = empRevs(emp.id);
    const ns = empSched(emp.id)[0];
    const openGoals = rl.flatMap((r) =>
      (r.goals || []).filter((g) => g.status === "open").map((g) => ({ ...g, revDate: r.date, revId: r.id }))
    );
    return (
      <div>
        <button
          onClick={() => navTo("staff")}
          style={{ background: "none", border: "none", color: "var(--color-text-secondary)", cursor: "pointer", fontSize: 14, marginBottom: 20, fontFamily: "'DM Sans', sans-serif", padding: 0 }}
        >
          ← Back to staff
        </button>

        {/* Terminated banner */}
        {isTerminated && (
          <div style={{ display: "flex", alignItems: "center", gap: 16, background: "#FCEBEB", border: "0.5px solid #F09595", borderRadius: 8, padding: "12px 20px", marginBottom: 20, flexWrap: "wrap" }}>
            <div style={{ flex: 1 }}>
              <div style={{ fontSize: 13, fontWeight: 600, color: "#A32D2D", marginBottom: 2 }}>
                Archived — {emp.terminationType}
              </div>
              <div style={{ fontSize: 12, color: "#993535" }}>
                {fmtDate(emp.terminatedDate)}{emp.terminationNotes ? ` · ${emp.terminationNotes}` : ""}
              </div>
            </div>
            <Btn variant="secondary" style={{ fontSize: 12, padding: "5px 12px", color: "#3B6D11", borderColor: "#97C459" }}
              onClick={() => { handleReactivate(emp.id); setSelEmp({ ...emp, status: "active" }); }}>
              Reactivate
            </Btn>
          </div>
        )}

        <div style={{ display: "flex", alignItems: "center", gap: 20, marginBottom: 24, flexWrap: "wrap" }}>
          <Avatar name={emp.name} size={64} />
          <div>
            <h1 style={{ ...styles.pageTitle, margin: "0 0 4px" }}>{emp.name}</h1>
            <div style={{ color: "var(--color-text-secondary)", fontSize: 15 }}>{emp.role || "—"}</div>
            {emp.startDate && (
              <div style={{ color: "var(--color-text-secondary)", fontSize: 13, marginTop: 2 }}>
                Since {fmtDate(emp.startDate)}
              </div>
            )}
          </div>
          <div style={{ marginLeft: "auto", display: "flex", gap: 10, flexWrap: "wrap" }}>
            {!isTerminated && (<>
              <Btn variant="secondary" onClick={() => setModal("schedRev")}>Schedule review</Btn>
              <Btn variant="secondary" onClick={() => setModal("newInc")} style={{ color: "#854F0B", borderColor: "#FAC775" }}>🔒 Add counseling record</Btn>
              <Btn onClick={() => setModal("newRev")}>+ Add review</Btn>
              <Btn variant="danger" onClick={() => setModal("terminate")} style={{ fontSize: 13 }}>Terminate</Btn>
            </>)}
          </div>
        </div>
        {ns && (
          <div
            style={{
              background: "var(--color-background-primary)",
              border: "0.5px solid var(--color-border-tertiary)",
              borderLeft: "3px solid #D4793A",
              borderRadius: "0 8px 8px 0",
              padding: "12px 20px",
              display: "flex",
              gap: 14,
              alignItems: "center",
              marginBottom: 20,
              flexWrap: "wrap",
              fontSize: 14,
              color: "var(--color-text-primary)",
            }}
          >
            <span style={{ color: "var(--color-text-secondary)" }}>Next scheduled review:</span>
            <strong>{fmtDate(ns.date)}</strong>
            <span style={{ color: "var(--color-text-secondary)" }}>({ns.type})</span>
            <UrgencyBadge days={daysUntil(ns.date)} />
          </div>
        )}
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16 }}>
          <Card>
            <CardHeader title="Open goals" />
            {openGoals.length === 0 ? (
              <EmptyMsg>No open goals. Goals set in reviews appear here.</EmptyMsg>
            ) : (
              openGoals.map((g) => (
                <div
                  key={g.id}
                  style={{ display: "flex", alignItems: "flex-start", gap: 12, padding: "11px 20px", borderBottom: "0.5px solid var(--color-border-tertiary)" }}
                >
                  <button
                    title="Mark complete"
                    onClick={() =>
                      setReviews((p) =>
                        p.map((r) =>
                          r.id === g.revId
                            ? { ...r, goals: r.goals.map((gl) => (gl.id === g.id ? { ...gl, status: "complete", completedAt: todayStr() } : gl)) }
                            : r
                        )
                      )
                    }
                    style={{ background: "none", border: "none", cursor: "pointer", fontSize: 18, color: "var(--color-border-secondary)", padding: 0, marginTop: 1 }}
                    onMouseOver={(e) => (e.target.style.color = "#5e8a64")}
                    onMouseOut={(e) => (e.target.style.color = "var(--color-border-secondary)")}
                  >
                    ○
                  </button>
                  <div style={{ flex: 1 }}>
                    <div style={{ fontSize: 14, color: "var(--color-text-primary)" }}>{g.text}</div>
                    <div style={{ fontSize: 11, color: "var(--color-text-secondary)", marginTop: 2 }}>
                      Set {fmtDate(g.revDate)}
                    </div>
                  </div>
                </div>
              ))
            )}
          </Card>
          <Card>
            <CardHeader title="Review history" />
            {rl.length === 0 ? (
              <EmptyMsg>No reviews yet. Click "Add review" to record the first one.</EmptyMsg>

              rl.map((r) => {
                const avg = avgRatings(r);
                const cg = (r.goals || []).filter((g) => g.status === "complete").length;
                const tg = (r.goals || []).length;
                return (
                  <ListRow key={r.id} onClick={() => navTo("reviewDetail", emp, r)}>
                    <div style={{ flex: 1 }}>
                      <div style={styles.rowName}>{r.type} · {fmtDate(r.date)}</div>
                      <div style={styles.rowMeta}>
                        {tg > 0 ? `${cg}/${tg} goals · ` : ""}
                        {(r.overallNotes || r.notes) ? (r.overallNotes || r.notes).slice(0, 55) + ((r.overallNotes || r.notes).length > 55 ? "…" : "") : "No notes"}
                      </div>
                    </div>
                    {avg && (
                      <span style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 22, fontWeight: 700, color: "#D4793A" }}>
                        {avg}
                      </span>
                    )}
                  </ListRow>
                );
              })
            )}
          </Card>
        </div>
        {/* Counseling records */}
        {(() => {
          const il = empIncs(emp.id);
          if (il.length === 0) return null;
          return (
            <Card style={{ marginTop: 16 }}>
              <CardHeader
                title="🔒 Counseling records"
                action={<span style={{ fontSize: 12, color: "var(--color-text-secondary)" }}>{il.length} record{il.length !== 1 ? "s" : ""} — confidential</span>}
              />
              {il.map((inc) => {
                const sev = INC_SEVERITY.find((s) => s.key === inc.severity);

                      <div style={styles.rowMeta}>
                        {inc.reporter}{openAI > 0 ? ` · ${openAI} open action${openAI > 1 ? "s" : ""}` : ""}
                        {inc.followUpDate ? ` · Follow-up ${fmtDate(inc.followUpDate)}` : ""}
                      </div>
                    </div>
                    {sev && (
                      <span style={{ fontSize: 11, fontWeight: 600, color: sev.color, background: sev.bg, borderRadius: 4, padding: "3px 9px", whiteSpace: "nowrap" }}>
                        {sev.label}
                      </span>
                    )}
                  </ListRow>
                );
              })}
            </Card>
          );
        })()}
      </div>
    );
