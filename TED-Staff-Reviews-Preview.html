<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TED Staff Reviews — Live Sync</title>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>

  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

  <style>
    :root {
      --color-background-primary: #ffffff;
      --color-background-secondary: #F5F0EB;
      --color-background-tertiary: #FAF8F5;
      --color-text-primary: #1B2838;
      --color-text-secondary: #6B6560;
      --color-text-tertiary: #9B958F;
      --color-border-tertiary: rgba(27,40,56,0.10);
      --color-border-secondary: rgba(27,40,56,0.18);
      --color-border-primary: rgba(27,40,56,0.30);
      --color-border-info: rgba(42,122,110,0.40);
      --color-border-danger: rgba(163,45,45,0.40);
      --color-border-success: rgba(59,109,17,0.40);
      --color-border-warning: rgba(212,121,58,0.40);
      --color-background-info: #E1F5EE;
      --color-background-danger: #FCEBEB;
      --color-background-success: #EAF3DE;
      --color-background-warning: #FAF0E6;
      --color-text-info: #2A7A6E;
      --color-text-danger: #A32D2D;
      --color-text-success: #3B6D11;
      --color-text-warning: #D4793A;
      --border-radius-md: 8px;
      --border-radius-lg: 12px;
      --border-radius-xl: 16px;
      --font-sans: 'DM Sans', sans-serif;
      --font-serif: Georgia, serif;
      --font-mono: 'DM Mono', monospace;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: #FAF8F5;
      color: #1B2838;
      -webkit-font-smoothing: antialiased;
    }
    input, select, textarea, button { font-family: 'DM Sans', sans-serif; }
    input[type=date]::-webkit-calendar-picker-indicator { opacity: 0.5; }

    /* Preview banner */
    #preview-banner {
      position: fixed;
      top: 0; left: 0; right: 0;
      background: #D4793A;
      color: #FAF8F5;
      text-align: center;
      padding: 8px 16px;
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      z-index: 9999;
    }
    #root { padding-top: 36px; }
  </style>
</head>
<body>

  <div id="preview-banner">
    TED Staff Reviews &nbsp;·&nbsp; Connected build &nbsp;·&nbsp; Data streaming live to your database automation
  </div>

  <div id="root">
    <div style="display:flex;align-items:center;justify-content:center;height:100vh;font-family:'DM Sans',sans-serif;color:#6B6560;font-size:14px;">
      Loading System Components…
    </div>
  </div>

  <script type="text/babel">
const { useState, useEffect, useCallback } = React;

const KEYS = { emps: "ted-rev-emps", revs: "ted-rev-revs", sched: "ted-rev-sched", incs: "ted-rev-incs", form: "ted-rev-form" };

// ── Default form definition (matches TED Employee Performance Review PDF) ─────
const DEFAULT_FORM_DEF = {
  sections: [
    {
      id: "efficiency", title: "Efficiency & Output",
      description: "Reviewer completes this section", color: "#2A7A6E", bg: "#E1F5EE",
      questions: [
        { id: "e1", num: 1, type: "rating", selfAssess: true,  text: "How consistently does this employee meet project deadlines and timelines?", scaleMin: "Rarely meets deadlines", scaleMax: "Always delivers on time" },
        { id: "e2", num: 2, type: "rating", selfAssess: true,  text: "How effectively does this employee manage their time and prioritise tasks under pressure?", scaleMin: "Needs significant improvement", scaleMax: "Exceptional" },
        { id: "e3", num: 3, type: "rating", selfAssess: false, text: "Does the employee complete work within scope without requiring excessive revisions or supervision?", scaleMin: "Needs significant improvement", scaleMax: "Exceptional" },
        { id: "e4", num: 4, type: "text",   selfAssess: false, text: "Notes on efficiency — specific examples of strong or weak performance:", placeholder: "Optional comments and examples…" },
      ],
    },
    {
      id: "quality", title: "Quality of Work",
      description: "Reviewer completes this section", color: "#1B2838", bg: "#E8EDF2",
      questions: [
        { id: "q5",  num: 5, type: "rating", selfAssess: true,  text: "How would you rate the overall quality of this employee's fabrication output?", scaleMin: "Needs significant improvement", scaleMax: "Exceptional" },
        { id: "q6",  num: 6, type: "rating", selfAssess: false, text: "Does the employee demonstrate a strong understanding of TED fabrication principals, design principles, and quality technical execution skills?", scaleMin: "Needs significant improvement", scaleMax: "Exceptional" },
        { id: "q7",  num: 7, type: "rating", selfAssess: true,  text: "How well does the employee incorporate feedback and iterate toward the best possible outcome?", scaleMin: "Needs significant improvement", scaleMax: "Exceptional" },
        { id: "q8",  num: 8, type: "rating", selfAssess: true,  text: "Does this employee show the ability to work autonomously when required?", scaleMin: "Relies heavily on constant feedback", scaleMax: "Capable of working independently" },
        { id: "q9",  num: 9, type: "text",   selfAssess: false, text: "Notes on quality — specific examples or standout projects:", placeholder: "Optional comments and examples…" },
      ],
    },
    {
      id: "dependability", title: "Dependability & Professionalism",
      description: "Reviewer completes this section", color: "#5C3D2E", bg: "#F2EBE6",
      questions: [
        { id: "d10", num: 10, type: "rating", selfAssess: true,  text: "How reliably does the employee communicate proactively — flagging issues, potential delays, or changes early?", scaleMin: "Needs significant improvement", scaleMax: "Exceptional" },
        { id: "d11", num: 11, type: "rating", selfAssess: true,  text: "Does the employee take ownership of their work and accountability for mistakes?", scaleMin: "Needs significant improvement", scaleMax: "Exceptional" },
        { id: "d12", num: 12, type: "rating", selfAssess: false, text: "How well does this employee adapt when priorities shift, new constraints emerge, or scope changes mid-project?", scaleMin: "Needs significant improvement", scaleMax: "Exceptional" },
        { id: "d13", num: 13, type: "text",   selfAssess: false, text: "Notes on dependability:", placeholder: "Optional comments…" },
      ],
    },
    {
      id: "teamwork", title: "Teamwork & Collaboration",
      description: "Reviewer completes this section", color: "#D4793A", bg: "#FAF0E6",
      questions: [
        { id: "t14", num: 14, type: "rating", selfAssess: true,  text: "How effectively does this employee communicate with colleagues across the studio?", scaleMin: "Needs significant improvement", scaleMax: "Exceptional" },
        { id: "t15", num: 15, type: "rating", selfAssess: true,  text: "Does this employee contribute positively to team culture — sharing knowledge, lifting others, and staying constructive under stress?", scaleMin: "Needs significant improvement", scaleMax: "Exceptional" },
        { id: "t16", num: 16, type: "rating", selfAssess: true,  text: "How well does the employee give and receive feedback from peers?", scaleMin: "Needs significant improvement", scaleMax: "Exceptional" },
        { id: "t17", num: 17, type: "text",   selfAssess: false, text: "Are there any team dynamics or interpersonal patterns worth noting?", placeholder: "Optional comments…" },
      ],
    },
  ],
  overallOptions: ["Exceeds expectations", "Meets expectations", "Partially meets expectations", "Below expectations"],
};

const REVIEW_TYPES = ["Quarterly", "Mid-Year", "Annual", "90-Day", "Probationary", "Check-In"];
const REPORTERS = ["Ted Ellison", "Carrie Pilch", "Jenna Kurtz-Medina", "Eric Millman", "Max Robertson-Ellison"];

const INC_CATEGORIES = [
  "Time & Attendance", "Performance / Output", "Communication",
  "Asset / Resource Management", "Workplace Conduct", "Safety",
  "Policy Violation", "Interpersonal Conflict", "Other"
];

const INC_SEVERITY = [
  { key: "observation", label: "Observation",                    color: "#2A7A6E", bg: "#E1F5EE" },
  { key: "verbal",      label: "Verbal Counseling",              color: "#D4793A", bg: "#FAF0E6" },
  { key: "written",     label: "Written Warning",                color: "#5C3D2E", bg: "#F2EBE6" },
  { key: "final",       label: "Final Warning",                  color: "#1B2838", bg: "#E8EDF2" },
  { key: "pip",         label: "Performance Improvement Plan",   color: "#A32D2D", bg: "#FCEBEB" },
];

const RATING_LABELS = ["", "Below expectations", "Needs development", "Meets expectations", "Exceeds expectations", "Outstanding"];

const uid = () => Math.random().toString(36).slice(2, 9);
const todayStr = () => new Date().toISOString().split("T")[0];
const daysUntil = (d) => Math.round((new Date(d + "T12:00:00") - new Date()) / 86400000);
const fmtDate = (d) => d ? new Date(d + "T12:00:00").toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" }) : "";

const avgRatings = (r) => {
  if (r.responses) {
    const vals = Object.values(r.responses).filter(v => typeof v === "number" && v > 0);
    return vals.length ? (vals.reduce((a, b) => a + b, 0) / vals.length).toFixed(1) : null;
  }
  return null;
};

// ── Shared Storage API Bridge ────────────────────────────────────────────────
async function storeGet(key) {
  try {
    const val = localStorage.getItem('ted-preview-' + key);
    return val ? JSON.parse(val) : null;
  } catch { return null; }
}

async function storeSet(key, val) {
  try {
    // 1. Maintain a secondary baseline backup layout locally
    localStorage.setItem('ted-preview-' + key, JSON.stringify(val));
    
    // 2. Stream transaction payload directly out to your Make.com Webhook endpoint
    await fetch("https://hook.us2.make.com/4966hompdu5zgmdyy2qfuq65s449bn07", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        timestamp: new Date().toISOString(),
        dataType: key,      // e.g., 'ted-rev-revs' (Reviews) or 'ted-rev-incs' (Counseling)
        payload: val        // Structural array tracking database entities
      })
    });
  } catch (err) {
    console.error("Cloud data synchronization failed: ", err);
  }
}

async function storePushAll() {
  return { ok: true };
}

// ── Primitive components ─────────────────────────────────────────────────────
const Avatar = ({ name, size = 40 }) => {
  const initials = name.split(" ").map((w) => w[0] || "").join("").slice(0, 2).toUpperCase();
  const hue = [...name].reduce((a, c) => a + c.charCodeAt(0), 0) % 360;
  return (
    <div style={{ width: size, height: size, borderRadius: "50%", background: `hsl(${hue}, 38%, 52%)`, display: "flex", alignItems: "center", justifyCenter: "center", display: "flex", alignItems: "center", justifyContent: "center", color: "#fff", fontWeight: 500, fontSize: size * 0.36, flexShrink: 0 }}>
      {initials}
    </div>
  );
};

const QuestionRating = ({ q, value, onChange, selfValue, readOnly }) => (
  <div style={{ marginBottom: 18 }}>
    <div style={{ fontSize: 13, fontWeight: 600, color: "var(--color-text-primary)", marginBottom: 8, lineHeight: 1.5 }}>
      <span style={{ color: "var(--color-text-secondary)", marginRight: 6 }}>{q.num}.</span>{q.text}
    </div>
    <div style={{ display: "flex", gap: 0, marginBottom: q.scaleMin ? 6 : 0 }}>
      {[1,2,3,4,5].map(n => (
        <button key={n} onClick={() => !readOnly && onChange && onChange(n === value ? 0 : n)}
          style={{ width: 52, padding: "9px 0", border: "0.5px solid var(--color-border-tertiary)", borderRight: n < 5 ? "none" : "0.5px solid var(--color-border-tertiary)", borderRadius: n === 1 ? "6px 0 0 6px" : n === 5 ? "0 6px 6px 0" : 0, background: value === n ? "var(--color-text-primary)" : "var(--color-background-secondary)", color: value === n ? "var(--color-background-primary)" : "var(--color-text-secondary)", fontSize: 15, fontWeight: value === n ? 700 : 400, cursor: readOnly ? "default" : "pointer", transition: "all .12s" }}>
          {n}
        </button>
      ))}
      {value > 0 && (
        <span style={{ marginLeft: 12, fontSize: 12, color: "var(--color-text-secondary)", alignSelf: "center" }}>
          {RATING_LABELS[value]}
        </span>
      )}
    </div>
    {q.scaleMin && !readOnly && (
      <div style={{ display: "flex", justifyContent: "space-between", fontSize: 11, color: "var(--color-text-secondary)", paddingTop: 2 }}>
        <span>1 = {q.scaleMin}</span><span>5 = {q.scaleMax}</span>
      </div>
    )}
  </div>
);

const UrgencyBadge = ({ days }) => {
  const [bg, text, label] =
    days < 0 ? ["#FCEBEB", "#A32D2D", `${Math.abs(days)}d overdue`]
    : days === 0 ? ["#FCEBEB", "#A32D2D", "Today"]
    : days <= 7 ? ["#FAEEDA", "#854F0B", `${days}d`]
    : ["#EAF3DE", "#3B6D11", `${days}d`];
  return (
    <span style={{ fontSize: 11, fontWeight: 600, color: text, background: bg, borderRadius: 4, padding: "3px 8px", whiteSpace: "nowrap" }}>
      {label}
    </span>
  );
};

const Modal = ({ title, onClose, children, wide }) => (
  <div style={{ maxWidth: wide ? 880 : 560 }}>
    <button onClick={onClose} style={{ background: "none", border: "none", color: "var(--color-text-secondary)", cursor: "pointer", fontSize: 14, marginBottom: 20, padding: 0 }}>
      ← Cancel
    </button>
    <h2 style={{ fontSize: 24, fontWeight: 700, color: "var(--color-text-primary)", margin: "0 0 24px" }}>{title}</h2>
    <div style={{ background: "var(--color-background-primary)", borderRadius: 12, padding: 28, border: "0.5px solid var(--color-border-tertiary)" }}>
      {children}
    </div>
  </div>
);

const FL = ({ children, mt = 16 }) => ( <label style={{ display: "block", fontSize: 10, fontFamily: "'DM Mono', monospace", textTransform: "uppercase", letterSpacing: "0.12em", color: "var(--color-text-secondary)", marginTop: mt, marginBottom: 6 }}>{children}</label> );
const FI = (props) => ( <input {...props} style={{ width: "100%", padding: "9px 12px", border: "0.5px solid var(--color-border-secondary)", borderRadius: 8, fontSize: 14, color: "var(--color-text-primary)", background: "var(--color-background-secondary)", outline: "none", boxSizing: "border-box", ...props.style }} /> );
const FTA = (props) => ( <textarea {...props} style={{ width: "100%", padding: "9px 12px", border: "0.5px solid var(--color-border-secondary)", borderRadius: 8, fontSize: 14, color: "var(--color-text-primary)", background: "var(--color-background-secondary)", outline: "none", resize: "vertical", boxSizing: "border-box", ...props.style }} /> );
const FSel = ({ value, onChange, children }) => ( <select value={value} onChange={onChange} style={{ width: "100%", padding: "9px 12px", border: "0.5px solid var(--color-border-secondary)", borderRadius: 8, fontSize: 14, color: "var(--color-text-primary)", background: "var(--color-background-secondary)", outline: "none", boxSizing: "border-box" }}>{children}</select> );

const Btn = ({ children, onClick, disabled, variant = "primary", style: extraStyle }) => {
  const styles = {
    primary: { background: disabled ? "var(--color-background-secondary)" : "#5C3D2E", color: disabled ? "var(--color-text-secondary)" : "#FAF8F5", border: "none" },
    secondary: { background: "transparent", color: "var(--color-text-primary)", border: "0.5px solid var(--color-border-secondary)" },
    danger: { background: "transparent", color: "#A32D2D", border: "0.5px solid #F09595" },
  };
  return ( <button onClick={onClick} disabled={disabled} style={{ ...styles[variant], borderRadius: 8, padding: "8px 16px", fontSize: 14, fontWeight: 500, cursor: disabled ? "not-allowed" : "pointer", transition: "all .15s", whiteSpace: "nowrap", ...extraStyle }}>{children}</button> );
};

const FormActions = ({ onCancel, onSave, saveLabel = "Save", disabled }) => (
  <div style={{ display: "flex", justifyContent: "flex-end", gap: 10, marginTop: 24, paddingTop: 20, borderTop: "0.5px solid var(--color-border-tertiary)" }}>
    <Btn variant="secondary" onClick={onCancel}>Cancel</Btn>
    <Btn onClick={onSave} disabled={disabled}>{saveLabel}</Btn>
  </div>
);

// ── Modals implementation ────────────────────────────────────────────────────
const AddEmployeeModal = ({ onClose, onSave }) => {
  const [name, setName] = useState("");
  const [role, setRole] = useState("");
  const [email, setEmail] = useState("");
  const [startDate, setStartDate] = useState("");
  return (
    <Modal title="Add staff member" onClose={onClose}>
      <FL mt={0}>Full name *</FL>
      <FI value={name} onChange={(e) => setName(e.target.value)} placeholder="Jane Smith" autoFocus />
      <FL>Role / title</FL>
      <FI value={role} onChange={(e) => setRole(e.target.value)} placeholder="e.g. Senior Fabricator" />
      <FL>Email address</FL>
      <FI type="email" value={email} onChange={(e) => setEmail(e.target.value)} placeholder="jane@studio.com" />
      <FL>Start date</FL>
      <FI type="date" value={startDate} onChange={(e) => setStartDate(e.target.value)} />
      <FormActions onCancel={onClose} onSave={() => onSave({ id: uid(), name: name.trim(), role: role.trim(), email: email.trim(), startDate, status: "active" })} saveLabel="Add staff member" disabled={!name.trim()} />
    </Modal>
  );
};

const ScheduleModal = ({ emp, onClose, onSave }) => {
  const [date, setDate] = useState("");
  const [type, setType] = useState("Quarterly");
  const [notes, setNotes] = useState("");
  return (
    <Modal title={`Schedule review — ${emp.name}`} onClose={onClose}>
      <FL mt={0}>Review date *</FL>
      <FI type="date" value={date} onChange={(e) => setDate(e.target.value)} min={todayStr()} autoFocus />
      <FL>Review type</FL>
      <FSel value={type} onChange={(e) => setType(e.target.value)}>{REVIEW_TYPES.map((t) => ( <option key={t}>{t}</option> ))}</FSel>
      <FL>Notes (optional)</FL>
      <FI value={notes} onChange={(e) => setNotes(e.target.value)} placeholder="Prep reminders…" />
      <FormActions onCancel={onClose} onSave={() => onSave({ id: uid(), employeeId: emp.id, date, type, notes, completed: false, createdAt: todayStr() })} saveLabel="Schedule" disabled={!date} />
    </Modal>
  );
};

const ReviewModal = ({ emp, prevReviews, onClose, onSave, formDef, employees }) => {
  const fd = formDef || DEFAULT_FORM_DEF;
  const inputSources = ["Ted Ellison", ...(employees || []).filter(e => e.status !== "terminated" && e.name !== "Ted Ellison").map(e => e.name)];
  const [date, setDate] = useState(todayStr());
  const [type, setType] = useState("Quarterly");
  const [reviewer, setReviewer] = useState("Ted Ellison");
  const [reviewPeriod, setReviewPeriod] = useState("");
  const [responses, setResponses] = useState({});
  const [peerInputs, setPeerInputs] = useState(Object.fromEntries(fd.sections.map(s => [s.id, []])));
  const [addingPeer, setAddingPeer] = useState(null);
  const [overallRating, setOverallRating] = useState("");
  const [summaryNotes, setSummaryNotes] = useState("");
  const [newGoal, setNewGoal] = useState("");
  const [goals, setGoals] = useState([]);

  const prevOpenGoals = prevReviews.flatMap(r => (r.goals || []).filter(g => g.status === "open").map(g => ({ ...g, sourceReviewId: r.id })));
  const [carry, setCarry] = useState(Object.fromEntries(prevOpenGoals.map(g => [g.id, true])));

  const savePeerInput = () => {
    if (!addingPeer?.source?.trim() || !addingPeer?.note?.trim()) return;
    const entry = { id: uid(), source: addingPeer.source.trim(), note: addingPeer.note.trim() };
    setPeerInputs(p => ({ ...p, [addingPeer.secId]: [...(p[addingPeer.secId] || []), entry] }));
    setAddingPeer(null);
  };

  const handleSave = () => {
    const carriedGoals = prevOpenGoals.filter(g => carry[g.id]).map(g => ({ ...g, status: "open", carriedFrom: g.sourceReviewId }));
    const review = {
      id: uid(), employeeId: emp.id, date, type, reviewer, reviewPeriod,
      responses, peerInputs, overallRating, summaryNotes,
      goals: [...carriedGoals, ...goals], formSnapshot: fd, createdAt: todayStr(),
    };
    const sourceIds = prevOpenGoals.filter(g => carry[g.id]).map(g => g.sourceReviewId);
    const carriedIds = prevOpenGoals.filter(g => carry[g.id]).map(g => g.id);
    onSave(review, sourceIds, carriedIds);
  };

  return (
    <div style={{ maxWidth: 820 }}>
      <button onClick={onClose} style={{ background: "none", border: "none", color: "var(--color-text-secondary)", cursor: "pointer", fontSize: 14, marginBottom: 20, padding: 0 }}>← Cancel</button>
      <div style={{ display: "flex", alignItems: "center", gap: 16, marginBottom: 24 }}>
        <Avatar name={emp.name} size={48} />
        <div>
          <h2 style={{ fontSize: 22, fontWeight: 700, color: "var(--color-text-primary)", margin: 0 }}>Performance review — {emp.name}</h2>
          <div style={{ fontSize: 13, color: "var(--color-text-secondary)", marginTop: 3 }}>{emp.role}</div>
        </div>
      </div>

      <div style={{ background: "var(--color-background-primary)", border: "0.5px solid var(--color-border-tertiary)", borderRadius: 12, padding: 20, marginBottom: 24, display: "grid", gridTemplateColumns: "1fr 1fr 1fr 1fr", gap: 14 }}>
        <div><FL mt={0}>Review date *</FL><FI type="date" value={date} onChange={e => setDate(e.target.value)} /></div>
        <div><FL mt={0}>Review type</FL><FSel value={type} onChange={e => setType(e.target.value)}>{REVIEW_TYPES.map(t => <option key={t}>{t}</option>)}</FSel></div>
        <div><FL mt={0}>Reviewer</FL><FI value={reviewer} onChange={e => setReviewer(e.target.value)} /></div>
        <div><FL mt={0}>Review period</FL><FI value={reviewPeriod} onChange={e => setReviewPeriod(e.target.value)} placeholder="e.g. Q1 2026" /></div>
      </div>

      {fd.sections.map(sec => (
        <div key={sec.id} style={{ background: "var(--color-background-primary)", border: "0.5px solid var(--color-border-tertiary)", borderLeft: `3px solid ${sec.color}`, borderRadius: "0 12px 12px 0", marginBottom: 20, overflow: "hidden" }}>
          <div style={{ padding: "12px 20px", background: sec.bg + "55", borderBottom: "0.5px solid var(--color-border-tertiary)" }}>
            <div style={{ fontSize: 15, fontWeight: 600, color: sec.color }}>{sec.title}</div>
          </div>
          <div style={{ padding: "18px 20px 4px" }}>
            {sec.questions.map(q => q.type === "rating" ? (
              <QuestionRating key={q.id} q={q} value={responses[q.id] || 0} onChange={v => setResponses(p=>({...p,[q.id]:v}))} />
            ) : (
              <div key={q.id} style={{ marginBottom: 18 }}>
                <div style={{ fontSize: 13, fontWeight: 600, color: "var(--color-text-primary)", marginBottom: 6 }}>{q.num}. {q.text}</div>
                <FTA value={responses[q.id] || ""} onChange={e => setResponses(p=>({...p,[q.id]:e.target.value}))} rows={3} />
              </div>
            ))}
          </div>

          <div style={{ padding: "16px 20px 18px", background: "#E8DFD0", borderTop: `3px solid ${sec.color}` }}>
            <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 12 }}>
              <div><div style={{ fontSize: 10, fontWeight:600, color: sec.color }}>STAFF EVALUATION FEEDBACK LOG</div></div>
              {addingPeer?.secId !== sec.id && (
                <button onClick={() => setAddingPeer({ secId: sec.id, source: "Ted Ellison", note: "" })} style={{ background: "#5C3D2E", color: "#FAF8F5", borderRadius: 6, padding: "6px 12px", border:"none", fontSize: 12, cursor:"pointer" }}>+ Add input</button>
              )}
            </div>

            {(peerInputs[sec.id] || []).map(pi => (
              <div key={pi.id} style={{ background: "#FAF8F5", padding: "10px", marginBottom: 6, borderRadius: 6 }}>
                <strong>{pi.source}:</strong> {pi.note}
              </div>
            ))}

            {addingPeer?.secId === sec.id && (
              <div style={{ background: "#FAF8F5", padding: 16, borderRadius: 8 }}>
                <FSel value={addingPeer.source} onChange={e => setAddingPeer(p => ({ ...p, source: e.target.value }))}>
                  {inputSources.map(n => <option key={n} value={n}>{n}</option>)}
                </FSel>
                <FTA value={addingPeer.note} onChange={e => setAddingPeer(p => ({ ...p, note: e.target.value }))} rows={2} style={{ marginTop: 8 }} />
                <div style={{ display: "flex", justifyContent: "flex-end", gap: 8, marginTop: 8 }}>
                  <Btn variant="secondary" onClick={() => setAddingPeer(null)}>Cancel</Btn>
                  <Btn onClick={savePeerInput}>Save</Btn>
                </div>
              </div>
            )}
          </div>
        </div>
      ))}

      <div style={{ background: "var(--color-background-primary)", borderRadius: 12, padding: 20, marginBottom: 20, border: "0.5px solid var(--color-border-tertiary)" }}>
        <FL mt={0}>Overall rating status</FL>
        <FSel value={overallRating} onChange={e => setOverallRating(e.target.value)}>
          <option value="">Select criteria...</option>
          {fd.overallOptions.map(o => <option key={o} value={o}>{o}</option>)}
        </FSel>
        <FL>Reviewer summary metrics & final remarks</FL>
        <FTA value={summaryNotes} onChange={e => setSummaryNotes(e.target.value)} rows={4} />
      </div>

      <div style={{ background: "var(--color-background-primary)", borderRadius: 12, padding: 20, marginBottom: 24, border: "0.5px solid var(--color-border-tertiary)" }}>
        <FL mt={0}>Establish Performance Goals</FL>
        <div style={{ display: "flex", gap: 8 }}>
          <FI value={newGoal} onChange={e => setNewGoal(e.target.value)} placeholder="Specify action milestone..." />
          <Btn variant="secondary" onClick={() => { if(newGoal.trim()){ setGoals(p=>([...p,{id:uid(), text:newGoal.trim(), status:"open"}])); setNewGoal(""); } }}>Add</Btn>
        </div>
        {goals.map((g,i) => <div key={i} style={{ marginTop: 6, fontSize:13 }}>• {g.text}</div>)}
      </div>

      <FormActions onCancel={onClose} onSave={handleSave} saveLabel="Complete review" />
    </div>
  );
};

  const [priorDetail, setPriorDetail] = useState(e.priorDetail || "");
  const [empResponse, setEmpResponse] = useState(e.employeeResponse || "");
  const [empAck, setEmpAck] = useState(e.employeeAcknowledged || false);

  return (

      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 24 }}>
        <div>
          <FL mt={0}>Incident Date</FL><FI type="date" value={date} onChange={ev => setDate(ev.target.value)} />
          <FL>Manager Recording</FL>
          <FSel value={reporter} onChange={ev => setReporter(ev.target.value)}>{REPORTERS.map(r => <option key={r}>{r}</option>)}</FSel>

          <FSel value={severity} onChange={ev => setSeverity(ev.target.value)}>{INC_SEVERITY.map(s => <option key={s.key} value={s.key}>{s.label}</option>)}</FSel>
        </div>
        <div>
          <FL mt={0}>Explanatory Details & Event Log</FL>
          <FTA value={description} onChange={ev => setDescription(ev.target.value)} rows={4} />
          <FL>Employee Explanatory Context & Remarks</FL>
          <FTA value={empResponse} onChange={ev => setEmpResponse(ev.target.value)} rows={3} />
          <FL>Target Follow-Up Audit Date</FL>
          <FI type="date" value={followUp} onChange={ev => setFollowUp(ev.target.value)} />
        </div>
      </div>
      <FormActions onCancel={onClose} onSave={() => onSave({ id: e.id || uid(), employeeId: emp.id, date, reporter, category, severity, description, employeeResponse: empResponse, followUpDate: followUp, createdAt: e.createdAt || todayStr() })} />
    </Modal>
  );
};

const TerminateModal = ({ emp, onClose, onSave }) => {
  const [date, setDate] = useState(todayStr());
  const [type, setType] = useState("Performance-based");
  return (
    <Modal title={`Archive Profile — ${emp.name}`} onClose={onClose}>

      <FSel value={type} onChange={e=>setType(e.target.value)}>
        <option>Performance-based</option><option>Voluntary resignation</option><option>Reduction in Force</option>

      <FormActions onCancel={onClose} onSave={() => onSave({ date, type, notes:"" })} saveLabel="Confirm Archive" />
    </Modal>
  );
};

  { id: uid(), name: "Jenna Kurtz-Medina",    role: "Operations / QuickBooks",               status: "active" },
  { id: uid(), name: "Kirk Kwiatkowski",      role: "Fabricator",                            status: "active" },
  { id: uid(), name: "Jesse Medina",          role: "Fabricator",                            status: "active" },
  { id: uid(), name: "Eric Millman",          role: "Client Management",                     status: "active" },

];

const Card = ({ children, style }) => ( <div style={{ background: "var(--color-background-primary)", border: "0.5px solid var(--color-border-tertiary)", borderRadius: 12, overflow: "hidden", marginBottom: 16, ...style }}>{children}</div> );
const CardHeader = ({ title, action }) => ( <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "14px 20px", borderBottom: "0.5px solid var(--color-border-tertiary)" }}><span style={{ fontFamily: "'DM Mono', monospace", fontSize: 11, fontWeight: 500, textTransform: "uppercase", letterSpacing: "0.1em" }}>{title}</span>{action}</div> );
const ListRow = ({ onClick, children, muted }) => ( <div onClick={onClick} style={{ display: "flex", alignItems: "center", gap: 12, padding: "13px 20px", borderBottom: "0.5px solid var(--color-border-tertiary)", cursor: onClick ? "pointer" : "default", opacity: muted ? 0.55 : 1 }}>{children}</div> );
const EmptyMsg = ({ children }) => ( <p style={{ color: "var(--color-text-secondary)", fontSize: 14, padding: 20, fontStyle: "italic" }}>{children}</p> );

// ── Application Core Architecture ───────────────────────────────────────────
function App() {
  const [loading, setLoading] = useState(true);
  const [employees, setEmployees] = useState([]);
  const [reviews, setReviews] = useState([]);
  const [scheduled, setScheduled] = useState([]);
  const [incidents, setIncidents] = useState([]);
  const [formDef, setFormDef] = useState(DEFAULT_FORM_DEF);
  const [view, setView] = useState("dashboard");
  const [selEmp, setSelEmp] = useState(null);
  const [selRev, setSelRev] = useState(null);
  const [selInc, setSelInc] = useState(null);
  const [modal, setModal] = useState(null);

  useEffect(() => {
    (async () => {
      const [e, r, s, i, fd] = await Promise.all([
        storeGet(KEYS.emps), storeGet(KEYS.revs), storeGet(KEYS.sched), storeGet(KEYS.incs), storeGet(KEYS.form),
      ]);
      setEmployees(e || DEFAULT_EMPLOYEES);
      setReviews(r || []);
      setScheduled(s || []);
      setIncidents(i || []);
      if (fd) setFormDef(fd);
      setLoading(false);
    })();
  }, []);

  const triggerSync = async (key, data) => {
    await storeSet(key, data);
  };

  const empRevs = useCallback((id) => reviews.filter((r) => r.employeeId === id).sort((a, b) => b.date.localeCompare(a.date)), [reviews]);
  const empSched = useCallback((id) => scheduled.filter((s) => s.employeeId === id && !s.completed).sort((a, b) => a.date.localeCompare(b.date)), [scheduled]);
  const empIncs = useCallback((id) => incidents.filter((i) => i.employeeId === id).sort((a, b) => b.date.localeCompare(a.date)), [incidents]);

  const handleSaveEmployee = (emp) => {
    const next = [...employees, emp]; setEmployees(next); setModal(null); triggerSync(KEYS.emps, next);
  };
  const handleSaveSchedule = (sched) => {
    const next = [...scheduled, sched]; setScheduled(next); setModal(null); triggerSync(KEYS.sched, next);
  };
  const handleSaveReview = (review) => {
    const nextR = [...reviews, review]; setReviews(nextR);
    const nextS = scheduled.map(s => s.employeeId === review.employeeId ? { ...s, completed: true } : s);
    setScheduled(nextS); setModal(null); setSelRev(review); setView("reviewDetail");
    triggerSync(KEYS.revs, nextR); triggerSync(KEYS.sched, nextS);
  };
  const handleSaveIncident = (inc) => {
    const exists = incidents.find(x => x.id === inc.id);
    const next = exists ? incidents.map(x => x.id === inc.id ? inc : x) : [...incidents, inc];
    setIncidents(next); setModal(null); setSelInc(inc); setView("incidentDetail"); triggerSync(KEYS.incs, next);
  };
  const handleTerminate = (tData) => {
    const next = employees.map(e => e.id === selEmp.id ? { ...e, status: "terminated", terminatedDate: tData.date, terminationType: tData.type } : e);
    setEmployees(next); setModal(null); setView("staff"); triggerSync(KEYS.emps, next);
  };

  if (loading) return ( <div style={{ display: "flex", alignItems: "center", justifyContent: "center", height: "100vh", color: "var(--color-text-secondary)" }}>Configuring Cloud Infrastructure Channels…</div> );

  return (
    <div style={{ display: "flex", minHeight: "100vh", background: "#FAF8F5" }}>
      {/* Sidebar Navigation */}
      <nav style={{ width: 190, background: "#1B2838", display: "flex", flexDirection: "column", position: "fixed", top: 0, left: 0, height: "100vh", zIndex: 10 }}>
        <div style={{ fontSize: 18, fontWeight: 500, color: "#FAF8F5", padding: "22px 20px", borderBottom: "1px solid rgba(255,255,255,0.08)" }}>
          TED <span style={{ display: "block", fontSize: 9, color: "rgba(232,223,208,0.5)", fontFamily:"'DM Mono'" }}>HQ INTERFACE</span>
        </div>
        {[
          { id: "dashboard", label: "Dashboard Workspace" },
          { id: "staff", label: "Staff Roster" },
          { id: "schedule", label: "Review Calendars" },
          { id: "counseling", label: "🔒 Counseling Log" },
          { id: "settings", label: "System Parameters" }
        ].map((n) => (
          <button key={n.id} onClick={() => { setView(n.id); setModal(null); }} style={{ display: "block", padding: "12px 20px", color: view === n.id ? "#FAF8F5" : "rgba(232,223,208,0.65)", background: view === n.id ? "rgba(255,255,255,0.05)" : "none", border: "none", textAlign: "left", width: "100%", cursor: "pointer", borderLeft: `3px solid ${view === n.id ? "#D4793A" : "transparent"}` }}>
            {n.label}
          </button>
        ))}
      </nav>

      {/* Primary Workspace Viewport Layouts */}
      <main style={{ marginLeft: 190, padding: "36px 40px", flex: 1 }}>
        {modal === "addEmp" && <AddEmployeeModal onClose={() => setModal(null)} onSave={handleSaveEmployee} />}
        {modal === "schedRev" && selEmp && <ScheduleModal emp={selEmp} onClose={() => setModal(null)} onSave={handleSaveSchedule} />}
        {modal === "newRev" && selEmp && <ReviewModal emp={selEmp} prevReviews={empRevs(selEmp.id)} onClose={() => setModal(null)} onSave={handleSaveReview} formDef={formDef} employees={employees} />}
        {modal === "newInc" && selEmp && <CounselingModal emp={selEmp} onClose={() => setModal(null)} onSave={handleSaveIncident} />}
        {modal === "terminate" && selEmp && <TerminateModal emp={selEmp} onClose={() => setModal(null)} onSave={handleTerminate} />}

        {!modal && (() => {
          switch (view) {
            case "dashboard":
              return (
                <div>
                  <h1 style={{ fontSize: 26, marginBottom: 20 }}>Overview Dashboard</h1>
                  <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 20 }}>
                    <Card><CardHeader title="Upcoming Appraisals" />
                      {scheduled.filter(s=>!s.completed).map(s => {
                        const target = employees.find(e => e.id === s.employeeId);
                        return target ? <ListRow key={s.id} onClick={() => { setSelEmp(target); setView("employee"); }}>{target.name} — Due: {s.date}</ListRow> : null;
                      })}
                    </Card>
                    <Card><CardHeader title="Recent Metrics Index" />
                      {reviews.slice(-4).map(r => {
                        const target = employees.find(e => e.id === r.employeeId);
                        return target ? <ListRow key={r.id} onClick={() => { setSelRev(r); setSelEmp(target); setView("reviewDetail"); }}>{target.name} ({r.type})</ListRow> : null;
                      })}
                    </Card>
                  </div>
                </div>
              );
            case "staff":
              return (
                <div>
                  <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 20 }}>
                    <h1 style={{ fontSize: 26 }}>Active Operations Roster</h1>
                    <Btn onClick={() => setModal("addEmp")}>+ Add Team Profile</Btn>
                  </div>
                  <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(240px, 1fr))", gap: 14 }}>
                    {employees.filter(e => e.status !== "terminated").map(e => (
                      <div key={e.id} onClick={() => { setSelEmp(e); setView("employee"); }} style={{ background: "#fff", padding: 20, borderRadius: 12, border: "0.5px solid var(--color-border-tertiary)", cursor: "pointer" }}>
                        <strong>{e.name}</strong><p style={{ fontSize:12, color:"grey" }}>{e.role}</p>
                      </div>
                    ))}
                  </div>
                </div>
              );
            case "employee":
              return selEmp ? (
                <div>
                  <button onClick={() => setView("staff")} style={{ background:"none", border:"none", cursor:"pointer", marginBottom: 14 }}>← Back to Roster</button>
                  <h1 style={{ fontSize: 28 }}>{selEmp.name}</h1>
                  <p style={{ color:"grey", marginBottom: 20 }}>{selEmp.role}</p>
                  <div style={{ display: "flex", gap: 10, marginBottom: 20 }}>
                    <Btn onClick={() => setModal("newRev")}>Execute Review</Btn>
                    <Btn variant="secondary" onClick={() => setModal("schedRev")}>Schedule Appraisal</Btn>
                    <Btn variant="secondary" onClick={() => setModal("newInc")} style={{ color: "#854F0B" }}>Log Incident</Btn>
                    <Btn variant="danger" onClick={() => setModal("terminate")}>Archive Profile</Btn>
                  </div>
                  <Card><CardHeader title="Evaluation History Log" />
                    {empRevs(selEmp.id).map(r => <ListRow key={r.id} onClick={() => { setSelRev(r); setView("reviewDetail"); }}>{r.type} Evaluation — Summary Score: {avgRatings(r) || "N/A"}/5</ListRow>)}
                  </Card>
                </div>
              ) : null;
            case "reviewDetail":
              return selRev ? (
                <div>
                  <button onClick={() => setView("employee")} style={{ background:"none", border:"none", cursor:"pointer", marginBottom: 14 }}>← Back to Profile</button>
                  <h1 style={{ fontSize: 24 }}>{selRev.type} Summary Assessment</h1>
                  <p style={{ marginBottom: 20 }}>Date: {selRev.date} · Reviewer: {selRev.reviewer}</p>
                  <Card><CardHeader title="Qualitative Notes & Metrics Matrix" />
                    <div style={{ padding: 20 }}>
                      <p><strong>Overall Standard Tier:</strong> {selRev.overallRating || "Not specified"}</p>
                      <p style={{ marginTop: 10, whiteSpace: "pre-wrap" }}><strong>Summary Evaluator Assessment Remarks:</strong><br />{selRev.summaryNotes || "No remarks entered."}</p>
                    </div>
                  </Card>
                </div>
              ) : null;
            case "counseling":
              return (
                <div>
                  <h1 style={{ fontSize: 26, marginBottom: 4 }}>Incident Management System</h1>
                  <p style={{ color: "grey", marginBottom: 20 }}>Secure Operations Tracking Directory</p>
                  <Card><CardHeader title="Secure Case Disciplinary Log" />
                    {incidents.map(i => {
                      const subject = employees.find(e => e.id === i.employeeId);
                      return (
                        <ListRow key={i.id}>
                          <strong>{subject ? subject.name : "Unknown Employee"}</strong> — {i.category} ({i.severity}) on {i.date}
                        </ListRow>
                      );
                    })}
                  </Card>
                </div>
              );
            case "settings":
              return (
                <div>
                  <h1 style={{ fontSize: 26, marginBottom: 14 }}>System Metrics Parameters</h1>
                  <Card><CardHeader title="Infrastructure Gateway Testing Channels" />
                    <div style={{ padding: 20 }}>
                      <p style={{ fontSize: 14, color: "green", fontWeight: 600 }}>● Outbound Connection Bridge Configured Successfully</p>
                      <p style={{ fontSize: 13, color: "grey", marginTop: 6 }}>Pipeline Target: Make Automation Server Platform Endpoint</p>
                    </div>
                  </Card>
                </div>
              );
            default:
              return <div>Section View Under Development.</div>;
          }
        })()}
      </main>
    </div>
  );
}

// System Execution Instantiation Engine
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
